        color: var(--r-blue) !important;
        background: var(--r-quote-bg) !important;
        border-color: var(--r-divider) !important;
      }
      .path-row.active-path,
      .scenario-pill.active-scenario,
      .view-toggle.active,
      .admin-row.row-active,
      .ob-app.ob-active,
      .admin-highlight {
        border-color: var(--r-blue) !important;
        background: var(--r-quote-bg) !important;
        color: var(--r-blue) !important;
      }

      .mt-secondary, .dr-panel {
        border-color: var(--r-blue) !important;
        color: var(--r-blue) !important;
      }
      .dr-metric.dr-lit {
        border-color: var(--r-blue) !important;
        background: var(--r-quote-bg) !important;
        color: var(--r-blue) !important;
      }
      .dr-bar { background: var(--r-blue) !important; }

      .ob-step.ob-active .ob-dot,
      .ap-step.ap-active .ap-dot,
      .phase-dot.active {
        background: var(--r-blue) !important;
        box-shadow: 0 0 0 3px rgba(0,0,204,0.18) !important;
      }
      .phase-dot.done { background: var(--r-green) !important; }
      .dtap-stage.dtap-current {
        border-color: var(--r-blue) !important;
        color: var(--r-blue) !important;
      }
      .ap-counter { color: var(--r-blue) !important; }

      /* Gradient fills that used old blue → flatten to Recast blue */
      .ap-device-header.workspace,
      .platform-bar-mini,
      .dr-global-badge {
        background: var(--r-blue) !important;
      }
      .dash-metric .metric-value,
      .flip-card-stat {
        background: none !important;
        -webkit-background-clip: initial !important;
        -webkit-text-fill-color: var(--r-blue) !important;
        color: var(--r-blue) !important;
      }
      .flip-card-back {
        color: var(--r-blue) !important;
        border-color: var(--r-blue) !important;
      }
      .orch-connector, .upd-bar, .mt-sync-line, .dr-feed-line, .dr-arrow-line {
        background: linear-gradient(to right, var(--r-blue), var(--r-green)) !important;
      }
      .cinema-progress-fill {
        background: linear-gradient(90deg, var(--r-blue), var(--r-green)) !important;
      }
      .cinema-caption .typing-cursor { background: var(--r-blue) !important; }

      /* ───── Recast Approach: final brand-color sweep ─────
         Targets remaining hex literals embedded in component CSS rules. */
      .path-row.active-path,
      .scenario-pill.active-scenario,
      .view-toggle.active,
      .lifecycle-label.lc-active,
      .admin-row.row-active {
        border-color: var(--r-blue) !important;
        background: var(--r-quote-bg) !important;
        color: var(--r-blue) !important;
        box-shadow: 0 0 8px rgba(0,0,204,0.10) !important;
      }
      .lifecycle-dot.lifecycle-dot-active { background: var(--r-blue) !important; }
      .lifecycle-play-btn {
        border-color: var(--r-cyan) !important;
        color: var(--r-blue) !important;
      }
      .lifecycle-play-btn:hover { background: var(--r-quote-bg) !important; }
      .lifecycle-play-btn.playing {
        background: rgba(220,38,38,0.08) !important;
        border-color: #ef4444 !important;
        color: #dc2626 !important;
      }
      /* Mini app-icons row in user/admin views */
      .ap-device-header.workspace {
        background: linear-gradient(135deg, var(--r-blue), var(--r-cyan)) !important;
      }
      .ap-device-header.autopilot {
        background: linear-gradient(135deg, #475569, #94a3b8) !important;
      }
      /* Mid-flow active borders/backgrounds in catalog rows */
      .catalog-app.clicked .app-icon {
        box-shadow: 0 0 0 3px rgba(0,191,255,0.45) !important;
      }
      .catalog-browse-item:hover { border-color: var(--r-cyan) !important; }
      /* dr-bar pulse glow */
      @keyframes drPulseBrand {
        0% { box-shadow: 0 0 0 0 rgba(0,0,204,0); }
        50% { box-shadow: 0 0 12px 3px rgba(0,0,204,0.18); }
        100% { box-shadow: 0 0 0 0 rgba(0,0,204,0); }
      }
      /* analyst trigger underline already cyan; ensure consistent */
      .analyst-trigger { border-bottom-color: var(--r-cyan) !important; }

      /* Flow bar / keyframes tint */
      @keyframes tilePulse {
        0% { transform: scale(0.7); background: #e5e7eb; opacity: 0.4; }
        60% { transform: scale(1); background: var(--r-blue); opacity: 1; }
        100% { background: #e5e7eb; opacity: 0.9; }
      }
      .dash-metric:hover {
        border-color: var(--r-blue) !important;
        box-shadow: 0 4px 20px rgba(0,0,204,0.08) !important;
      }

      /* ROI number inputs */
      input[type="number"], input[type="text"] {
        border-color: var(--r-divider) !important;
      }
      input[type="number"]:focus, input[type="text"]:focus {
        border-color: var(--r-blue) !important;
        outline: 2px solid rgba(0,0,204,0.15) !important;
        outline-offset: 0 !important;
      }
      #roi-employees { color: var(--r-blue) !important; }

      /* Focus ring */
      .focus-ring:focus-visible {
        outline: 2px solid var(--r-cyan) !important;
        outline-offset: 2px !important;
      }

      /* ───── Modal chrome ───── */
      .modal-overlay { background: rgba(26,26,46,0.55) !important; }
      .modal-content {
        border-radius: 8px !important;
        box-shadow: 0 20px 60px rgba(26,26,46,0.30) !important;
      }

      /* ───── Chart colors ───── */
      .chart-annotation { fill: var(--r-blue) !important; }

      /* ───── Tweak a few tailwind blue/indigo utilities to Recast palette ───── */
      .text-blue-200, .text-blue-300 { color: var(--r-muted-blue) !important; }
      .text-blue-600, .text-blue-700, .text-blue-800 { color: var(--r-blue) !important; }
      .bg-blue-50, .bg-indigo-50 { background-color: var(--r-quote-bg) !important; }
      .bg-blue-100 { background-color: var(--r-surface-2) !important; }
      .bg-blue-400 { background-color: var(--r-cyan) !important; }
      .border-blue-200, .border-indigo-200 { border-color: var(--r-divider) !important; }

      /* ───── Logo ticker gradient masks use white — keep */
      /* ═════════════════════════════════════════════════════════════
         SETUP STORE VIEW
         ═════════════════════════════════════════════════════════════ */
      .ss-zone { border-radius: 10px; padding: 12px; transition: opacity 0.5s ease, transform 0.5s ease; }
      .ss-zone.ss-hidden { opacity: 0; transform: translateY(10px); }
      .ss-zone.ss-visible { opacity: 1; transform: translateY(0); }

      .ss-vendor-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
      .ss-vendor-tile { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px;
        border-radius: 6px; background: white; border: 1px solid var(--r-divider);
        opacity: 0; transform: scale(0.8); transition: all 0.3s ease; }
      .ss-vendor-tile.ss-show { opacity: 1; transform: scale(1); }
      .ss-vendor-tile .ss-v-icon { width: 26px; height: 26px; border-radius: 6px;
        display: grid; place-items: center; font-size: 9px; font-weight: 800; color: white; }
      .ss-vendor-tile .ss-v-name { font-size: 8px; color: var(--r-ink-2); font-weight: 600; }

      .ss-counter { font-family: ui-monospace, monospace; font-size: 22px; font-weight: 800;
        color: var(--r-blue); letter-spacing: -0.02em; }
      .ss-counter-custom {
        font-family: 'Fraktion Mono','Inter',ui-monospace,monospace;
        font-size: 16px;
        font-weight: 800;
        color: var(--r-blue);
        letter-spacing: -0.01em;
        display: inline-flex;
        align-items: center;
      }

      /* Mode toggle */
      .ss-mode-toggle {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px;
        border-radius: 999px;
        background: var(--r-quote-bg);
        border: 1px solid var(--r-divider);
      }
      .ss-mode-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        font-size: 11px;
        font-weight: 600;
        color: var(--r-ink-2);
        background: transparent;
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        transition: background 150ms, color 150ms, box-shadow 150ms;
        white-space: nowrap;
      }
      .ss-mode-pill:hover { color: var(--r-blue); }
      .ss-mode-pill.is-active {
        background: #fff;
        color: var(--r-blue);
        box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 0 0 1px var(--r-blue);
      }
      .ss-mode-pill .ss-mode-num {
        font-family: ui-monospace, monospace;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .ss-mode-pill .ss-mode-label { font-weight: 600; }
      .ss-mode-pill.is-active .ss-mode-label { font-weight: 700; }

      /* Custom packaging rail (Phase 1 in custom mode) */
      .ss-custom-rail {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 12px 10px;
        background: linear-gradient(180deg, rgba(0,191,255,0.06), rgba(0,0,204,0.04));
        border: 1px solid rgba(0,0,204,0.12);
        border-radius: 8px;
        margin: 6px 0 4px;
        flex-wrap: wrap;
      }
      .ss-custom-source {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: var(--r-blue);
        color: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,204,0.20);
        opacity: 0; transform: translateY(2px);
        transition: opacity 0.45s ease, transform 0.45s ease;
      }
      .ss-custom-source.ss-show { opacity: 1; transform: translateY(0); }
      .ss-custom-source-icon {
        width: 22px; height: 22px;
        display: grid; place-items: center;
        background: rgba(255,255,255,0.16);
        border-radius: 5px;
        color: #fff;
      }
      .ss-custom-source-name { font-size: 11px; font-weight: 800; line-height: 1; }
      .ss-custom-source-version { font-size: 9px; font-weight: 600; opacity: 0.85; margin-top: 2px; }
      .ss-custom-arrow {
        display: inline-flex;
        align-items: center;
        color: #00BFFF;
      }
      .ss-custom-stage {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        background: #fff;
        color: var(--r-ink);
        font-size: 11px;
        font-weight: 700;
        border: 1px solid rgba(0,0,204,0.18);
        border-radius: 999px;
        opacity: 0; transform: translateY(2px);
        transition: opacity 0.45s ease, transform 0.45s ease;
      }
      .ss-custom-stage.ss-show { opacity: 1; transform: translateY(0); }
      .ss-custom-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #00BFFF;
        box-shadow: 0 0 0 2px rgba(0,191,255,0.18);
      }
      .ss-custom-target {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        background: #fff;
        color: var(--r-blue);
        font-size: 11px;
        font-weight: 800;
        border: 1px dashed var(--r-blue);
        border-radius: 8px;
        opacity: 0; transform: translateY(2px);
        transition: opacity 0.45s ease, transform 0.45s ease;
      }
      .ss-custom-target.ss-show { opacity: 1; transform: translateY(0); }

      /* Custom package icon (Phase 2 in custom mode) */
      .ss-package-icon-custom {
        background: var(--r-blue) !important;
        color: #fff !important;
        position: relative;
      }
      .ss-package-icon-custom::after {
        content: '';
        position: absolute;
        right: -2px; top: -2px;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #00BFFF;
        box-shadow: 0 0 0 2px #fff;
      }
      .ss-vendor-pulse-custom {
        background: var(--r-blue) !important;
        color: #fff !important;
        display: grid;
        place-items: center;
      }

      /* Smooth height-reveal wrapper — @keyframes fires on element insert (unlike transition) */
      .ss-grow { display: grid; grid-template-rows: 0fr; overflow: hidden; }
      .ss-grow > .ss-grow-inner { min-height: 0; }
      .ss-grow.ss-grow-done { grid-template-rows: 1fr; overflow: visible; }
      .ss-grow.ss-grow-active { animation: ssGrowIn 0.55s cubic-bezier(0.4,0,0.2,1) forwards; }
      @keyframes ssGrowIn {
        from { grid-template-rows: 0fr; opacity: 0; }
        to   { grid-template-rows: 1fr; opacity: 1; }
      }

      .ss-package-card { background: white; border: 2px solid var(--r-blue); border-radius: 8px;
        padding: 14px; box-shadow: var(--shadow-elevated); }
      .ss-package-card.ss-pop { /* entry handled by ss-grow wrapper */ }

      .ss-package-header { display: flex; align-items: center; gap: 10px; padding-bottom: 10px;
        border-bottom: 1px solid var(--r-divider); margin-bottom: 10px; }
      .ss-package-icon { width: 32px; height: 32px; border-radius: 7px; display: grid; place-items: center;
        font-size: 13px; font-weight: 800; color: white; }
      .ss-package-name { font-size: 13px; font-weight: 700; color: var(--r-ink); }
      .ss-package-version { font-size: 10px; color: var(--r-ink-2); font-family: ui-monospace, monospace; }

      .ss-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .ss-field { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 4px;
        background: var(--r-quote-bg); font-size: 10px; color: var(--r-ink);
        opacity: 0; transform: translateX(-6px); transition: all 0.3s ease; }
      .ss-field.ss-fill { opacity: 1; transform: translateX(0); }
      .ss-field i[data-lucide] { width: 12px; height: 12px; color: var(--r-blue-bright); flex-shrink: 0; }

      .ss-security-row { display: flex; gap: 8px; margin-top: 10px;
        opacity: 0; transform: translateY(6px); transition: all 0.4s ease; }
      .ss-security-row.ss-show { opacity: 1; transform: translateY(0); }
      .ss-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px;
        border-radius: 4px; font-size: 10px; font-weight: 700; }
      .ss-badge-clean { background: #ECFDF5; color: var(--r-green); border: 1px solid #A7F3D0; }
      .ss-badge-cve { background: #FFF7ED; color: var(--r-amber); border: 1px solid #FED7AA; }
      .ss-badge-supersede { background: var(--r-quote-bg); color: var(--r-blue); border: 1px solid var(--r-divider);
        font-family: ui-monospace, monospace; }

      .ss-update-flow { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding: 10px;
        border-radius: 6px; background: var(--r-quote-bg); border: 1px dashed var(--r-blue-bright);
        opacity: 0; transition: opacity 0.4s ease; }
      .ss-update-flow.ss-show { opacity: 1; }
      .ss-vendor-pulse { width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center;
        font-size: 10px; font-weight: 800; color: white; background: var(--r-blue); flex-shrink: 0; }
      .ss-vendor-pulse.ss-pulsing { animation: ssPulse 1.5s ease-in-out infinite; }
      @keyframes ssPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(42,127,255,0); }
                           50% { box-shadow: 0 0 0 6px rgba(42,127,255,0.25); } }
      @keyframes ssPulseCta {
        0%, 100% { box-shadow: 0 2px 8px rgba(0, 0, 204, 0.25); }
        50% { box-shadow: 0 2px 16px rgba(0, 191, 255, 0.55); }
      }
      .ss-pulse-cta { animation: ssPulseCta 2s ease-in-out infinite; }

      .ss-dtap-bar { display: flex; align-items: center; gap: 0; margin-top: 10px; }
      .ss-dtap-stage { flex: 1; text-align: center; padding: 5px 4px; font-size: 9px; font-weight: 700;
        color: var(--r-ink-2); border-bottom: 3px solid var(--r-divider); transition: all 0.4s ease; }
      .ss-dtap-stage.ss-done { border-color: var(--r-green); color: var(--r-green); }
      .ss-dtap-stage.ss-current { border-color: var(--r-blue); color: var(--r-blue); }
      .ss-dtap-arrow { font-size: 10px; color: var(--r-divider); padding: 0 2px; }

      .ss-fanout { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 14px; }
      .ss-fanout-source { padding: 6px 14px; border-radius: 6px; background: var(--r-blue); color: white;
        font-size: 11px; font-weight: 700; }
      .ss-fanout-lines { display: flex; justify-content: center; gap: 24px; }
      .ss-fanout-line { width: 2px; height: 0; background: linear-gradient(180deg, var(--r-blue), var(--r-blue-bright));
        border-radius: 2px; transition: height 0.6s ease; }
      .ss-fanout-line.ss-drawn { height: 24px; }
      .ss-fanout-targets { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
      .ss-target { padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 600;
        background: white; border: 1px solid var(--r-divider); color: var(--r-ink-2);
        opacity: 0; transform: translateY(4px); transition: all 0.4s ease; }
      .ss-target.ss-show { opacity: 1; transform: translateY(0); }
      .ss-target.ss-primary { border-color: var(--r-blue); color: var(--r-blue); font-weight: 700; }

      .ss-callouts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
      .ss-callout { padding: 12px; border-radius: 6px; background: white; border: 1px solid var(--r-divider); }
      .ss-callout i[data-lucide] { width: 18px; height: 18px; color: var(--r-blue-bright); margin-bottom: 6px; }
      .ss-callout-title { font-size: 12px; font-weight: 700; color: var(--r-ink); margin-bottom: 3px; }
      .ss-callout-body { font-size: 10px; color: var(--r-ink-2); line-height: 1.4; }

      .ss-final-line { text-align: center; margin-top: 14px; padding: 10px; font-size: 13px; font-weight: 700;
        color: var(--r-blue); background: var(--r-quote-bg); border-radius: 6px; }

      .ss-categories-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 4px;
        margin-top: 8px;
      }
      .ss-cat-pill {
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        background: white;
        border: 1px solid var(--r-divider);
        color: var(--r-ink-2);
      }

      .ss-arrow-active {
        color: var(--r-blue) !important;
        font-weight: 700;
        animation: ssArrowPulse 1.2s ease-in-out infinite;
      }
      .ss-arrow-pending {
        color: var(--r-divider) !important;
      }
      @keyframes ssArrowPulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }

      .ss-connectors-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--r-ink-2);
        margin-top: 4px;
        margin-bottom: 4px;
      }

      /* ═════════════════════════════════════════════════════════════
         SETUP STORE — 3-ACT ANIMATION STAGE
         ═════════════════════════════════════════════════════════════ */
      .ss-act-stage {
        position: relative;
        min-height: 360px;
      }

      /* Caption row (above visual) — flicker during ticker, settle on resolve */
      .ss-caption-stream {
        height: 28px;
        line-height: 28px;
        text-align: center;
        font-family: ui-monospace, 'Fraktion Mono', monospace;
        font-size: 12px;
        font-weight: 700;
        color: var(--r-ink-2);
        letter-spacing: -0.005em;
        margin-bottom: 8px;
        transition: color 200ms ease, background 200ms ease;
        border-radius: 6px;
      }
      .ss-caption-stream.ss-caption-empty { color: transparent; }
      .ss-caption-stream.ss-caption-flicker {
        animation: ssCaptionFlick 60ms steps(1) infinite;
        color: var(--r-blue);
      }
      .ss-caption-stream.ss-caption-final {
        color: var(--r-blue);
        background: var(--r-quote-bg);
        font-size: 13px;
        font-weight: 800;
        animation: ssCaptionResolve 360ms cubic-bezier(0.2,0.8,0.2,1) both;
      }
      @keyframes ssCaptionFlick {
        0%   { opacity: 1; }
        50%  { opacity: 0.55; }
      }
      @keyframes ssCaptionResolve {
        0%   { transform: scale(0.96); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }

      .ss-act-panel {
        position: relative;
        transition: opacity 320ms ease;
      }
      .ss-act-panel.ss-act-show { opacity: 1; }
      .ss-act-panel.ss-act-hide { opacity: 0; }

      /* ── Act 1: catalog scale ───────────────────────────────────
         Top bar: counter "8,047" + small "+ yours" foreshadow + 5 category counts.
         Below: a dense scrolling list of real apps so you can SEE the volume,
         ending with a single "YourApp · custom" row that lives in the same list. */
      .ss-act1-stage {
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: white;
        border: 1px solid var(--r-divider);
        border-radius: 10px;
        padding: 14px;
      }

      .ss-act1-top {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 28px;
        align-items: center;
      }
      .ss-act1-headline {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .ss-act1-eyebrow {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--r-ink-2);
      }
      .ss-act1-count-row {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .ss-counter-big {
        font-family: ui-monospace, 'Fraktion Mono', monospace;
        font-size: 56px;
        font-weight: 800;
        color: var(--r-ink);
        letter-spacing: -0.04em;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .ss-act1-plus {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border: 1px dashed var(--r-divider);
        border-radius: 8px;
        background: var(--r-quote-bg);
      }
      .ss-act1-plus-sign {
        font-size: 18px;
        font-weight: 700;
        color: var(--r-blue);
        line-height: 1;
        font-family: ui-monospace, monospace;
      }
      .ss-act1-plus-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--r-ink);
      }
      .ss-act1-cats {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 4px;
      }
      .ss-act1-cat {
        display: flex;
        flex-direction: column;
        gap: 1px;
        padding: 6px 8px;
        border-left: 2px solid var(--r-divider);
      }
      .ss-act1-cat-num {
        font-family: ui-monospace, monospace;
        font-size: 14px;
        font-weight: 700;
        color: var(--r-ink);
        line-height: 1.1;
        font-variant-numeric: tabular-nums;
      }
      .ss-act1-cat-name {
        font-size: 10px;
        color: var(--r-ink-2);
        font-weight: 500;
      }

      /* Dense scrolling catalog list — the real evidence of volume */
      .ss-catalog {
        position: relative;
        border: 1px solid var(--r-divider);
        border-radius: 8px;
        background: white;
        overflow: hidden;
      }
      .ss-catalog-head {
        display: grid;
        grid-template-columns: 1fr 130px 110px;
        gap: 12px;
        padding: 6px 12px;
        background: var(--r-quote-bg);
        border-bottom: 1px solid var(--r-divider);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--r-ink-2);
      }
      .ss-catalog-viewport {
        position: relative;
        height: 180px;
        overflow: hidden;
      }
      .ss-catalog-track {
        display: flex;
        flex-direction: column;
        animation: ssCatalogScroll 28s linear infinite;
      }
      @keyframes ssCatalogScroll {
        from { transform: translateY(0); }
        /* The list is doubled at render time; scroll exactly half so it loops seamlessly */
        to   { transform: translateY(-50%); }
      }
      .ss-catalog-row {
        display: grid;
        grid-template-columns: 1fr 130px 110px;
        gap: 12px;
        align-items: center;
        padding: 7px 12px;
        border-bottom: 1px solid var(--r-divider);
        flex-shrink: 0;
      }
      .ss-catalog-row:last-child { border-bottom: 1px solid var(--r-divider); }
      .ss-catalog-app {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .ss-catalog-icon {
        width: 22px;
        height: 22px;
        border-radius: 5px;
        display: grid;
        place-items: center;
        font-size: 10px;
        font-weight: 800;
        color: white;
        flex-shrink: 0;
      }
      .ss-catalog-icon-custom {
        background: white;
        color: var(--r-blue);
        border: 1.5px dashed var(--r-blue);
      }
      .ss-catalog-name {
        font-size: 12px;
        font-weight: 600;
        color: var(--r-ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ss-catalog-dim {
        font-weight: 500;
        color: var(--r-ink-2);
      }
      .ss-catalog-ver {
        font-family: ui-monospace, monospace;
        font-size: 11px;
        color: var(--r-ink-2);
        font-variant-numeric: tabular-nums;
      }
      .ss-catalog-status {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        font-weight: 600;
        color: #15803d;
      }
      .ss-catalog-status [data-lucide] { color: #16a34a; }
      .ss-catalog-row-custom {
        background: var(--r-quote-bg);
      }
      .ss-catalog-status-custom {
        color: var(--r-blue);
      }
      .ss-catalog-status-custom [data-lucide] { color: var(--r-blue); }

      /* Top + bottom fade masks soften the marquee edges */
      .ss-catalog-fade {
        position: absolute;
        left: 0; right: 0;
        height: 24px;
        pointer-events: none;
        z-index: 2;
      }
      .ss-catalog-fade-top {
        top: 26px; /* sits below the header row */
        background: linear-gradient(180deg, white 0%, rgba(255,255,255,0) 100%);
      }
      .ss-catalog-fade-bottom {
        bottom: 0;
        background: linear-gradient(0deg, white 0%, rgba(255,255,255,0) 100%);
      }

      /* ── FINAL beat: synthesis frame — two parallel columns + handoff ──
         Static layout. No motion. The visual claim: Setup Store and Custom
         Packaging are the same engine pointed at two different inputs, and
         both flow into the same Admin Console. */
      .ss-synth {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .ss-synth-header {
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .ss-synth-headline {
        font-size: 18px;
        font-weight: 700;
        color: var(--r-ink);
        letter-spacing: -0.01em;
      }
      .ss-synth-sub {
        font-size: 12px;
        color: var(--r-ink-2);
        font-weight: 500;
      }

      .ss-synth-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        align-items: stretch;
      }
      .ss-synth-col {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
        background: white;
        border-radius: 10px;
        border-width: 1px;
        border-style: solid;
        position: relative;
      }
      .ss-synth-col-store  { border-color: rgba(74, 100, 255, 0.35); box-shadow: 0 0 0 3px rgba(74, 100, 255, 0.05); }
      .ss-synth-col-custom { border-color: rgba(0, 191, 255, 0.4);  box-shadow: 0 0 0 3px rgba(0, 191, 255, 0.06); }

      .ss-synth-col-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--r-divider);
      }
      .ss-synth-col-title {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--r-ink);
        font-weight: 700;
        font-size: 14px;
      }
      .ss-synth-col-store .ss-synth-col-title [data-lucide]  { color: var(--r-blue); }
      .ss-synth-col-custom .ss-synth-col-title [data-lucide] { color: #00BFFF; }

      .ss-synth-pill {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 999px;
      }
      .ss-synth-pill-store  { background: var(--r-quote-bg); color: var(--r-blue); }
      .ss-synth-pill-custom { background: rgba(0, 191, 255, 0.12); color: #0288A8; }

      .ss-synth-payload {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 132px;
      }
      .ss-synth-num {
        font-family: ui-monospace, 'Fraktion Mono', monospace;
        font-size: 36px;
        font-weight: 800;
        color: var(--r-ink);
        letter-spacing: -0.04em;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .ss-synth-num-label {
        font-size: 11px;
        color: var(--r-ink-2);
        font-weight: 500;
      }
      .ss-synth-vendors {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 4px;
      }
      .ss-synth-vendor {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 8px 3px 3px;
        background: white;
        border: 1px solid var(--r-divider);
        border-radius: 999px;
        font-size: 10px;
        font-weight: 600;
        color: var(--r-ink);
      }
      .ss-synth-vendor .ss-v-icon {
        width: 18px; height: 18px;
        border-radius: 4px;
        display: grid; place-items: center;
        font-size: 8px; font-weight: 800;
        color: white;
      }
      .ss-synth-vendor .ss-v-name { font-size: 10px; }
      .ss-synth-vendor-more {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        font-size: 10px;
        font-weight: 600;
        color: var(--r-ink-2);
        background: var(--r-quote-bg);
        border-radius: 999px;
      }

      .ss-synth-custom-card {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        background: rgba(0, 191, 255, 0.06);
        border: 1px dashed rgba(0, 191, 255, 0.4);
        border-radius: 8px;
      }
      .ss-synth-custom-icon {
        width: 36px; height: 36px;
        border-radius: 7px;
        background: white;
        border: 1.5px dashed #00BFFF;
        color: #00BFFF;
        display: grid; place-items: center;
      }
      .ss-synth-custom-meta { display: flex; flex-direction: column; gap: 1px; }
      .ss-synth-custom-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--r-ink);
      }
      .ss-synth-dim { font-weight: 500; color: var(--r-ink-2); }
      .ss-synth-custom-sub {
        font-size: 10px;
        color: var(--r-ink-2);
        font-family: ui-monospace, monospace;
        font-variant-numeric: tabular-nums;
      }
      .ss-synth-custom-note {
        font-size: 11px;
        color: var(--r-ink-2);
        line-height: 1.4;
        margin-top: 2px;
      }

      .ss-synth-spine {
        list-style: none;
        margin: 0;
        padding: 8px 0 0 0;
        border-top: 1px dashed var(--r-divider);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px 12px;
      }
      .ss-synth-step {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--r-ink);
        font-weight: 500;
        line-height: 1.3;
      }
      .ss-synth-check {
        width: 12px; height: 12px;
        flex-shrink: 0;
      }
      .ss-synth-step-store .ss-synth-check,
      .ss-synth-step-custom .ss-synth-check    { color: #16a34a; }
      .ss-synth-step-inherited .ss-synth-check { color: #00BFFF; }
      .ss-synth-step-inherited                  { color: var(--r-ink); }
      .ss-synth-badge-inherit {
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #0288A8;
        margin-left: auto;
      }

      .ss-synth-foot {
        font-size: 11px;
        color: var(--r-ink-2);
        font-style: italic;
        padding-top: 8px;
        border-top: 1px dashed var(--r-divider);
        margin-top: auto;
      }

      .ss-synth-handoff {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 4px 0 0 0;
      }
      .ss-synth-handoff-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, var(--r-divider) 50%, transparent 100%);
      }
      .ss-synth-handoff-label {
        font-size: 12px;
        color: var(--r-ink);
        font-weight: 500;
        white-space: nowrap;
      }
      .ss-synth-handoff-label strong {
        font-weight: 700;
        color: var(--r-blue);
      }
      .ss-synth-handoff-label [data-lucide] {
        color: var(--r-blue);
      }

      /* Act progress bar (replaces "(1 of 4)" pill in header) */
      .ss-act-progress {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        background: white;
        border: 1px solid var(--r-divider);
        border-radius: 999px;
      }
      .ss-act-step {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 6px;
        border-radius: 999px;
        font-size: 9px;
        font-weight: 700;
        color: var(--r-ink-2);
        letter-spacing: 0.04em;
        transition: all 180ms ease;
      }
      .ss-act-step-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--r-divider);
        transition: all 180ms ease;
      }
      .ss-act-step.is-done {
        color: var(--r-ink-2);
      }
      .ss-act-step.is-done .ss-act-step-dot {
        background: #22c55e;
      }
      .ss-act-step.is-active {
        background: var(--r-quote-bg);
        color: var(--r-blue);
      }
      .ss-act-step.is-active .ss-act-step-dot {
        background: var(--r-blue);
        box-shadow: 0 0 0 3px rgba(74, 100, 255, 0.18);
      }

      /* ── Acts 2 + 3: cards stage ─────────────────────────────── */
      .ss-cards-stage {
        position: relative;
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        transition: grid-template-columns 380ms cubic-bezier(0.4,0.0,0.2,1);
      }
      .ss-cards-stage.ss-cards-shifted {
        grid-template-columns: 1fr 1fr;
      }
      .ss-cards-stage .ss-package-card {
        margin: 0;
        transition: transform 380ms cubic-bezier(0.4,0.0,0.2,1),
                    box-shadow 320ms ease;
      }

      /* Adobe card slides slightly left when shifted; YourApp slides in from right */
      .ss-card-adobe { z-index: 2; }
      .ss-card-adobe.ss-card-shifted {
        box-shadow: var(--shadow-elevated), 0 0 0 1px rgba(0,0,204,0.05);
      }
      .ss-card-your {
        opacity: 0;
        transform: translateX(40px);
        pointer-events: none;
        transition: opacity 380ms ease, transform 380ms cubic-bezier(0.2,0.8,0.2,1);
        border-color: var(--r-blue) !important;
      }
      .ss-card-your.ss-card-your-in {
        opacity: 1;
        transform: translateX(0);
        pointer-events: auto;
      }

      /* When stage is NOT shifted, only Adobe occupies the grid; hide YourApp slot */
      .ss-cards-stage:not(.ss-cards-shifted) .ss-card-your {
        display: none;
      }

      /* Field check mark — appears when field is done */
      .ss-field-check {
        width: 12px; height: 12px;
        margin-left: auto;
        color: var(--r-green);
        flex-shrink: 0;
        animation: ssCheckPop 280ms cubic-bezier(0.2,0.8,0.2,1) both;
      }
      @keyframes ssCheckPop {
        0% { transform: scale(0); opacity: 0; }
        60% { transform: scale(1.2); }
        100% { transform: scale(1); opacity: 1; }
      }
      .ss-field-done { background: rgba(16,129,86,0.05) !important; border-left: 2px solid var(--r-green); padding-left: 6px; }
      .ss-field-inherited { border-left-color: #00BFFF !important; background: rgba(0,191,255,0.06) !important; }
      .ss-field-inherited::before {
        content: '';
        position: absolute;
        left: -2px; top: 0; bottom: 0;
        width: 2px;
        background: linear-gradient(180deg, #00BFFF, var(--r-blue));
      }

      /* SVG inheritance lines layer */
      .ss-inherit-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: visible;
        z-index: 3;
      }
      .ss-inherit-line {
        fill: none;
        stroke: #00BFFF;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-dasharray: var(--len, 200);
        stroke-dashoffset: var(--len, 200);
        filter: drop-shadow(0 0 4px rgba(0,191,255,0.6));
        animation: ssLineDraw 360ms cubic-bezier(0.4,0.0,0.2,1) forwards;
      }
      @keyframes ssLineDraw {
        to { stroke-dashoffset: 0; }
      }

      /* Badge pop animation (used for security badges in both cards) */
      .ss-security-row.ss-show .ss-badge-pop {
        opacity: 0;
        transform: scale(0.85);
        animation: ssBadgePop 320ms cubic-bezier(0.2,0.8,0.2,1) forwards;
        animation-delay: var(--pop-delay, 0ms);
      }
      @keyframes ssBadgePop {
        to { opacity: 1; transform: scale(1); }
      }

      /* Final beat — combined source badges */
      .ss-fanout-source-combined {
        display: inline-flex !important;
        align-items: center;
        gap: 6px;
      }
      .ss-fanout-source-badges {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-left: 6px;
        padding-left: 8px;
        border-left: 1px solid rgba(255,255,255,0.25);
      }
      .ss-fanout-mini-badge {
        width: 18px; height: 18px;
        border-radius: 4px;
        display: inline-grid;
        place-items: center;
        font-size: 10px;
        font-weight: 800;
      }
      .ss-fanout-mini-adobe { background: #ED2224; color: #fff; }
      .ss-fanout-mini-your { background: #00BFFF; color: #fff; }
      .ss-fanout-mini-your i { width: 10px; height: 10px; }

      /* ═════════════════════════════════════════════════════════════
         MOBILE — comprehensive overhaul for <= 900px
         Goal: every tab usable with a single vertical scroll, no overflow.
         ═════════════════════════════════════════════════════════════ */
      html, body { overflow-x: hidden; }

      @media (max-width: 900px) {
        /* Unlock the scroll-free shell — mobile uses normal document scroll */
        html, body { overflow-x: hidden; overflow-y: auto; height: auto; }
        body > #app { height: auto; display: block; }
        body > #app > main.mx-auto {
          overflow: visible;
          height: auto;
          padding-top: 12px !important;
          padding-bottom: 24px !important;
        }
        body > #app > main.mx-auto > section {
          padding: 0 14px !important;
          max-width: 100% !important;
        }

        /* ── Hero ─────────────────────────────────────── */
        header.relative::before, header.relative::after { display: none; }
        header.relative > div:first-child {
          padding: 20px 14px 14px !important;
        }
        .recast-eyebrow-row { margin-bottom: 10px !important; gap: 10px !important; }
        .recast-eyebrow-mark { width: 30px !important; height: 30px !important; }
        .recast-eyebrow-mark svg { width: 16px !important; height: 16px !important; }
        .recast-eyebrow-label { font-size: 13px !important; }
        header.relative h1 {
          font-size: 26px !important;
          line-height: 1.15 !important;
          max-width: none !important;
        }
        header.relative h1::after { width: 36px !important; height: 2px !important; margin-top: 10px !important; }
        header.relative p {
          font-size: 13px !important;
          line-height: 1.5 !important;
          margin-top: 10px !important;
          max-width: none !important;
        }

        /* ── Tabs — horizontal scroll rail ────────────── */
        header.relative > div:last-child { padding: 0 !important; }
        .recast-tabs {
          padding: 0 14px !important;
          margin-top: 14px !important;
          border-top: 1px solid rgba(255,255,255,0.15) !important;
          -webkit-overflow-scrolling: touch;
        }
        .recast-tab {
          padding: 12px 14px !important;
          font-size: 13px !important;
          gap: 6px !important;
        }
        .recast-tab svg, .recast-tab i { width: 14px !important; height: 14px !important; }

        /* ── Sections / cards ─────────────────────────── */
        #panel-problems.space-y-4 > * + *,
        #panel-solution.space-y-3 > * + *,
        #panel-roi.space-y-4 > * + * { margin-top: 10px !important; }
        .section-card { padding: 14px !important; border-radius: 6px !important; }
        .section-card.p-6, .section-card.p-8 { padding: 14px !important; }
        .section-card h2, .section-card h3 { font-size: 15px !important; margin-bottom: 6px !important; }
        .sub-card, .sub-card.p-6, .sub-card.p-4 { padding: 10px !important; }

        /* ── Universal: collapse desktop grid/flex layouts ── */
        main.mx-auto .grid.grid-cols-2,
        main.mx-auto .grid.grid-cols-3,
        main.mx-auto .grid.grid-cols-4,
        main.mx-auto .md\:grid-cols-2,
        main.mx-auto .md\:grid-cols-3,
        main.mx-auto .md\:grid-cols-4,
        main.mx-auto .lg\:grid-cols-2,
        main.mx-auto .lg\:grid-cols-3,
        main.mx-auto .lg\:grid-cols-4 {
          grid-template-columns: 1fr !important;
          gap: 10px !important;
        }
        main.mx-auto .flex.gap-4,
        main.mx-auto .flex.gap-6,
        main.mx-auto .flex.gap-8 {
          flex-wrap: wrap !important;
          gap: 10px !important;
        }
        /* Any flex row with explicit widths should stack */
        main.mx-auto .flex.flex-row:not(.no-mobile-stack) {
          flex-direction: column !important;
          align-items: stretch !important;
        }

        /* ── Capacity gap chart — scale to fit viewport ── */
        .chart-container { overflow: visible !important; max-height: 260px !important; aspect-ratio: auto !important; }
        #capacity-gap-chart { min-width: 0 !important; width: 100% !important; max-height: 260px !important; height: 260px !important; }
        #capacity-gap-chart svg { width: 100% !important; height: 100% !important; }
        /* Driver pills row */
        .driver-pills, .drivers-row { flex-wrap: wrap !important; gap: 6px !important; }
        .driver-pill, .driver-pills button { font-size: 11px !important; padding: 6px 8px !important; }

        /* ── Device frames (Admin View, Multi-tenant, Onboarding etc) ── */
        .device-frame,
        #deviceFrame, #ap-device-frame, #mt-device-frame, #ob-device-frame, #dr-device-frame {
          max-width: 100% !important;
          width: 100% !important;
          max-height: none !important;
          transform: none !important;
          border-radius: 8px !important;
        }
        .device-frame .device-header { padding: 6px 10px !important; font-size: 11px !important; }
        .device-frame .sidebar,
        .device-frame [class*="sidebar"] {
          display: none !important;
        }
        .device-frame .main-content,
        .device-frame [class*="main-content"] {
          width: 100% !important;
          padding: 12px !important;
        }
        /* Fallback: collapse any inner two-column split inside device frames */
        .device-frame .grid-cols-\[200px_1fr\],
        .device-frame .grid-cols-\[240px_1fr\],
        .device-frame .grid-cols-\[260px_1fr\] {
          grid-template-columns: 1fr !important;
        }

        /* ── Catalog / tile grids ─────────────────────── */
        .catalog-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
        .catalog-grid .tile, .catalog-grid > * { padding: 8px !important; font-size: 12px !important; }
        .ap-cascade-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 4px !important; }

        /* ── Flip cards ───────────────────────────────── */
        .flip-card { height: auto !important; min-height: 80px !important; }
        .flip-card-inner, .flip-card-front, .flip-card-back { position: relative !important; height: auto !important; min-height: 80px !important; }

              <div id="finalPayoff" class="sub-card p-4 mt-2 text-center final-glow" style="background:linear-gradient(135deg,#f0fdf4,#eff6ff);border-color:#10b981">
                <div class="text-lg font-bold text-[#0A1C60] mb-1">Click → It just works</div>
                <div class="text-xs text-[#4A5568]">First access, backend migration, security patch -  completely different scenarios. The user experience was identical every time.</div>
                <div class="text-[10px] text-slate-500 mt-2 leading-relaxed">Application Workspace packages, delivers, configures, updates, and routes apps -  across every platform, every environment, every change. Define once. Deliver everywhere. No rework.</div>
                <div class="text-xs font-semibold text-[#0A1C60] mt-3">Four different scenarios. Zero tickets created. Zero per-platform rebuilds. That's the capacity your team gets back.</div>
              </div>
            ` : ''}
          </div>
        `;
      }

      function renderPipeline(){
        const sc = STATE.flowScenarioIdx;
        const phase = STATE.flowPhase;
        const scenario = sc >= 0 && sc < SCENARIOS.length ? SCENARIOS[sc] : null;

        const stageState = (stagePhases) => {
          if (!scenario) return '';
          const idx = ['launch','catalog','clicking','checking','routing','config','done','final'];
          const currentIdx = idx.indexOf(phase);
          if (currentIdx < 0) return '';
          const lastIdx = idx.indexOf(stagePhases[stagePhases.length - 1]);
          if (currentIdx > lastIdx) return 'reached';
          if (stagePhases.includes(phase)) return 'active-stage';
          return '';
        };
        const progressPct = !scenario ? 0 :
          phase === 'clicking' ? 8 : phase === 'checking' ? 28 :
          phase === 'routing' ? 48 : phase === 'config' ? 68 :
          phase === 'done' ? 88 : phase === 'final' ? 100 : 0;
        const checkDone = ['routing','config','done','final'].includes(phase);

        return `
          <div class="section-card p-3 rounded-2xl">
            <div class="flex items-center gap-2 mb-2">
              <div class="bts-label bts-label-engine"><i data-lucide="cpu" class="w-3 h-3"></i> How It Works -  Per Click</div>
              ${STATE.flowRunning ? `
                <button type="button" data-action="pause-flow" class="inline-flex items-center gap-1 px-2 py-1 text-[10px] font-semibold rounded-full border transition ${STATE.flowPaused ? 'bg-[#0070F3] text-white border-[#0070F3]' : 'bg-white text-[#64748b] border-slate-300 hover:border-[#0070F3] hover:text-[#0070F3]'}">
                  <i data-lucide="${STATE.flowPaused ? 'play' : 'pause'}" class="w-3 h-3"></i>
                  ${STATE.flowPaused ? 'Resume' : 'Pause'}
                </button>
              ` : ''}
            </div>
            <div class="sub-card p-3 bg-gradient-to-b from-white to-slate-50">
              ${!scenario || phase === 'idle' ? `
                <div class="text-center py-4 text-sm text-slate-400">
                  <i data-lucide="play-circle" class="w-6 h-6 mx-auto mb-2 text-slate-300"></i>
                  <div>Press <strong>Start</strong> to see the orchestration pipeline</div>
                </div>
              ` : `
                <div class="pipeline">
                  <div class="pipeline-progress" style="height:${progressPct}%"></div>
                  <div class="pipeline-stage ${stageState(['clicking'])}">
                    <div class="pipeline-node"><i data-lucide="zap" class="w-2 h-2 text-white"></i></div>
                    <div class="stage-content">
                      <div class="stage-title"><i data-lucide="workflow" class="w-3.5 h-3.5 text-[#0070F3]"></i> Smart Icon activates</div>
                      <div class="stage-detail">One click triggers the orchestration engine to evaluate, route, and deliver.</div>
                    </div>
                  </div>
                  <div class="pipeline-stage ${stageState(['checking'])}">
                    <div class="pipeline-node"><i data-lucide="search" class="w-2 h-2 text-white"></i></div>
                    <div class="stage-content">
                      <div class="stage-title"><i data-lucide="scan-search" class="w-3.5 h-3.5 text-[#0070F3]"></i> Evaluate user context</div>
                      <div class="stage-detail mb-1.5">Checks user, device, and environment -  no admin intervention.</div>
                      <div class="flex flex-wrap gap-1.5" id="checkItems">
                        ${scenario.checks.map((c, i) => `
                          <div class="check-item ${checkDone ? 'pass' : ''}" id="check-${i}" title="${c.a}">
                            <i data-lucide="${checkDone ? 'check-circle' : 'circle'}" class="w-3 h-3"></i>
                            <span>${c.q}</span>
                            ${checkDone ? '<span style="color:#059669;font-weight:600;margin-left:2px">' + c.a + '</span>' : ''}
                          </div>
                        `).join('')}
                      </div>
                    </div>
                  </div>
                  <div class="pipeline-stage ${stageState(['routing'])}">
                    <div class="pipeline-node"><i data-lucide="git-branch" class="w-2 h-2 text-white"></i></div>
                    <div class="stage-content">
                      <div class="stage-title"><i data-lucide="route" class="w-3.5 h-3.5 text-[#0070F3]"></i> Route to delivery path</div>
                      <div class="stage-detail mb-1.5">One path activates. The rest stay dormant.</div>
                      <div class="flex flex-wrap gap-1.5">
                        ${ALL_PATHS.map(p => {
                          const isActive = p.id === scenario.activePath && ['routing','config','done','final'].includes(phase);
                          const isInactive = p.id !== scenario.activePath && ['routing','config','done','final'].includes(phase);
                          return `<div class="path-row ${isActive ? 'active-path' : ''} ${isInactive ? 'inactive-path' : ''}">
                            <i data-lucide="${p.icon}" class="w-3 h-3"></i>
                            <span>${p.id === scenario.activePath ? scenario.pathLabel : p.label}</span>
                            ${isActive ? '<i data-lucide="check" class="w-3 h-3 text-green-500"></i>' : ''}
                          </div>`;
                        }).join('')}
                      </div>
                    </div>
                  </div>
                  <div class="pipeline-stage ${stageState(['config'])}">
                    <div class="pipeline-node"><i data-lucide="settings" class="w-2 h-2 text-white"></i></div>
                    <div class="stage-content">
                      <div class="stage-title"><i data-lucide="shield-check" class="w-3.5 h-3.5 text-amber-500"></i> Apply configuration + policy</div>
                      ${scenario.configBundle ? `
                        <div class="space-y-1 mt-1">
                          ${scenario.configBundle.map((c, i) => `
                            <div class="cfg-item ${['config','done','final'].includes(phase) ? 'attached' : ''}" style="transition-delay:${i * 0.15}s">
                              <i data-lucide="${c.icon}" class="w-3 h-3 text-amber-500 flex-shrink-0"></i>
                              <span>${c.label}</span>
                              <span class="cfg-status">${c.status}</span>
                            </div>
                          `).join('')}
                        </div>
                      ` : ''}
                      ${scenario.id === 'update' ? `
                        <div class="flex items-center gap-2 mt-2">
                          <span class="px-1.5 py-0.5 rounded bg-red-50 border border-red-200 text-red-600 text-[10px]">v2.1</span>
                          <div class="flex-1"><div class="upd-bar ${['config','done','final'].includes(phase) ? 'filling' : ''}"></div></div>
                          <span class="px-1.5 py-0.5 rounded ${['done','final'].includes(phase) ? 'bg-green-50 border border-green-200 text-green-600' : 'bg-slate-50 border border-slate-200 text-slate-400'} text-[10px]">v2.2</span>
                        </div>
                      ` : ''}
                    </div>
                  </div>
                  ${scenario.dtap ? `
                  <div class="pipeline-stage ${stageState(['config','done','final'])}">
                    <div class="pipeline-node"><i data-lucide="git-merge" class="w-2 h-2 text-white"></i></div>
                    <div class="stage-content">
                      <div class="stage-title"><i data-lucide="layers" class="w-3.5 h-3.5 text-indigo-500"></i> Release pipeline</div>
                      <div class="dtap-bar">
                        ${scenario.dtap.stages.map((s, i) => `
                          ${i > 0 ? '<span class="dtap-arrow">\u2192</span>' : ''}
                          <div class="dtap-stage ${['config','done','final'].includes(phase) ? (i < scenario.dtap.current ? 'dtap-done' : i === scenario.dtap.current ? 'dtap-current' : '') : ''}">
                            ${s}
                            ${['config','done','final'].includes(phase) ? '<div class="text-[7px]">' + (i < scenario.dtap.current ? '\u2713' : i === scenario.dtap.current ? scenario.dtap.version : '') + '</div>' : ''}
                          </div>
                        `).join('')}
                      </div>
                    </div>
                  </div>
                  ` : ''}
                  <div class="pipeline-stage ${stageState(['done','final'])}">
                    <div class="pipeline-node"><i data-lucide="check" class="w-2 h-2 text-white"></i></div>
                    <div class="stage-content" style="${['done','final'].includes(phase) ? 'border-color:#10b981;background:linear-gradient(135deg,#f0fdf4,#ecfdf5)' : ''}">
                      <div class="stage-title"><i data-lucide="rocket" class="w-3.5 h-3.5 text-green-500"></i> One definition -  every environment</div>
                      <div class="stage-detail">Same app definition works across Laptop, VDI, Cloud PC, Browser. Define once, deliver everywhere.</div>
                    </div>
                  </div>
                </div>
              `}
            </div>
          </div>
        `;
      }

      function clearFlowTimers(){
        if (!STATE.flowTimers) STATE.flowTimers = { intervals: [], timeouts: [] };
        STATE.flowTimers.intervals.forEach(id => clearInterval(id));
        STATE.flowTimers.timeouts.forEach(id => clearTimeout(id));
        STATE.flowTimers.intervals = [];
        STATE.flowTimers.timeouts = [];
      }

      function buildFlowQueue(){
        const queue = [];
        const idx = 0;
        const isCatalog = SCENARIOS[0].id === 'catalog';
        // Launch phase: user opens Application Workspace on their device
        queue.push({ delay: 600, fn(){ STATE.flowScenarioIdx = idx; STATE.flowPhase = 'launch'; STATE.flowAppOpened = false; updateFlowDOM(); } });
        // Catalog phase: workspace opens, user sees all their apps
        queue.push({ delay: 1200, fn(){ STATE.flowPhase = 'catalog'; updateFlowDOM(); } });
        // Clicking phase: user selects an app from the catalog
        queue.push({ delay: 1500, fn(){ STATE.flowPhase = 'clicking'; updateFlowDOM(); } });
        queue.push({ delay: 1200, fn(){ STATE.flowPhase = 'checking'; updateFlowDOM(); animateChecks(); } });
        queue.push({ delay: 2000, fn(){ STATE.flowPhase = 'routing'; updateFlowDOM(); } });
        queue.push({ delay: 1500, fn(){ STATE.flowPhase = 'config'; updateFlowDOM(); } });
        queue.push({ delay: 1500, fn(){ STATE.flowPhase = 'done'; if (isCatalog) { STATE._firstOpenDone = false; STATE.flowAppOpened = true; } updateFlowDOM(); } });
        queue.push({ delay: 2000, fn(){ STATE.flowPhase = 'final'; updateFlowDOM(); } });
        queue.push({ delay: 3000, fn(){ STATE.flowRunning = false; STATE.flowPaused = false; updateFlowDOM(); } });
        return queue;
      }

      function runFlowQueue(){
        if (STATE.flowPaused || STATE.flowQueueIdx >= STATE.flowQueue.length) return;
        const step = STATE.flowQueue[STATE.flowQueueIdx];
        const tid = setTimeout(() => {
          if (STATE.flowPaused) return;
          step.fn();
          STATE.flowQueueIdx++;
          runFlowQueue();
        }, step.delay);
        STATE.flowTimers.timeouts.push(tid);
      }

      function scrollPreserveRender(){
        const mainEl = document.querySelector('body > #app > main');
        const mainScrollTop = mainEl ? mainEl.scrollTop : 0;
        const winScrollTop = window.scrollY || document.documentElement.scrollTop || 0;
        render();
        const newMainEl = document.querySelector('body > #app > main');
        if (newMainEl) newMainEl.scrollTop = mainScrollTop;
        if (winScrollTop > 0) {
          document.documentElement.scrollTop = winScrollTop;
          document.body.scrollTop = winScrollTop;
        }
      }

      function startFlow(){
        if (STATE.flowRunning) return;
        clearFlowTimers();
        STATE.flowRunning = true;
        STATE.flowPaused = false;
        STATE.flowScenarioIdx = 0;
        STATE.flowPhase = 'idle';
        STATE.flowAppOpened = false;
        STATE._firstOpenDone = false;
        STATE._acSeen = {};
        STATE.flowQueue = buildFlowQueue();
        STATE.flowQueueIdx = 0;
        scrollPreserveRender();
        runFlowQueue();
      }

      function pauseFlow(){
        if (!STATE.flowRunning) return;
        STATE.flowPaused = true;
        STATE.flowTimers.timeouts.forEach(id => clearTimeout(id));
        STATE.flowTimers.timeouts = [];
        scrollPreserveRender();
      }

      function resumeFlow(){
        if (!STATE.flowRunning || !STATE.flowPaused) return;
        STATE.flowPaused = false;
        scrollPreserveRender();
        runFlowQueue();
      }

      function animateChecks(){
        const items = document.querySelectorAll('.check-item');
        items.forEach((item, i) => {
          const tid = setTimeout(() => {
            if (STATE.flowPaused) return;
            item.classList.add('pass');
            const ico = item.querySelector('[data-lucide]');
            if (ico) {
              ico.setAttribute('data-lucide', 'check-circle');
              if (window.lucide?.createIcons) try { window.lucide.createIcons(); } catch {}
            }
          }, i * 350);
          STATE.flowTimers.timeouts.push(tid);
        });
      }

      function updateFlowDOM(){
        if (STATE.activeTab !== 'solution') { render(); return; }
        const panelSection = document.querySelector('main > section');
        if (!panelSection) { render(); return; }
        panelSection.innerHTML = renderSolution();
        if (window.lucide?.createIcons) try { window.lucide.createIcons(); } catch {}
      }

      function resetFlow(){
        clearFlowTimers();
        STATE.flowStep = -1;
        STATE.flowRunning = false;
        STATE.flowPaused = false;
        STATE.flowScenarioIdx = -1;
        STATE.flowPhase = 'idle';
        STATE.flowQueue = [];
        STATE.flowQueueIdx = 0;
        STATE.flowAppOpened = false;
        STATE._firstOpenDone = false;
        STATE._acSeen = {};
        STATE.flowDevice = null;
        render();
      }

      function stepFlow(){
        if (STATE.flowRunning) return;
        if (!STATE.flowDevice) STATE.flowDevice = 'multi';
        if (!STATE.flowQueue || STATE.flowQueue.length === 0) {
          STATE.flowQueue = buildFlowQueue();
          STATE.flowQueueIdx = 0;
          STATE.flowPhase = 'idle';
          STATE.flowPaused = true;
        }
        if (STATE.flowQueueIdx >= STATE.flowQueue.length) return;
        const step = STATE.flowQueue[STATE.flowQueueIdx];
        step.fn();
        STATE.flowQueueIdx++;
      }

      function startAppCascade(){
        STATE.autopilotAppCount = 0;
        let count = 0;
        const cascadeInterval = setInterval(() => {
          count++;
          STATE.autopilotAppCount = count;
          // Targeted DOM updates -  no full re-render during rapid cascade
          const counterEl = document.getElementById('ap-app-counter');
          if (counterEl) counterEl.textContent = count + '/' + AP_APPS.length;
          const stepCounter = document.getElementById('ap-step-counter');
          if (stepCounter) stepCounter.textContent = count;
          const grid = document.getElementById('ap-cascade-grid');
          if (grid) {
            const icon = grid.children[count - 1];
            if (icon) {
              icon.classList.add('visible');
              // Replace placeholder with colored icon
              const app = AP_APPS[count - 1];
              icon.innerHTML = '<div class="ap-app-sq" style="background:' + app.c + '">' + app.l + '</div>';
            }
          }
          if (count >= AP_APPS.length) {
            clearInterval(cascadeInterval);
            if (counterEl) { counterEl.classList.add('done'); }
            const frame = document.getElementById('ap-device-frame');
            if (frame) frame.classList.add('ap-wow-glow');
          }
        }, 40);
        STATE.flowTimers.intervals.push(cascadeInterval);
      }

      function render(){
        const root=document.getElementById('app');
        root.innerHTML = `
          <header class="rs-appbar">
            <div class="rs-appbar-strip">
              <div class="rs-appbar-inner">
                <div class="rs-brand">
                  <span class="rs-brand-mark">Re</span>
                  <span class="rs-brand-label">Recast<span class="rs-brand-label-soft"> Software</span></span>
                </div>
                <div class="rs-appbar-divider" aria-hidden="true"></div>
                <div class="rs-product">Application Workspace</div>
                <div class="rs-em-dash" aria-hidden="true">&mdash;</div>
                <div class="rs-subtitle">${
                  STATE.activeTab==='problems'
                    ? 'One package, every workspace &mdash; laptop, Cloud PC, or VDI.'
                    : STATE.activeTab==='solution'
                      ? 'One model that stops multiplying work per platform.'
                      : 'Keep applications running smoothly as platforms change.'
                }</div>
              </div>
            </div>
            <nav class="rs-tabbar">
              <div class="rs-tabbar-inner" role="tablist" aria-label="Demo sections">
                ${TABS.map(t=>`
                  <button type="button"
                    class="rs-tab ${STATE.activeTab===t.id ? 'is-active' : ''} focus-ring"
                    data-action="switch-tab" data-tab="${t.id}"
                    aria-controls="panel-${t.id}" aria-selected="${STATE.activeTab===t.id}">
                    <i data-lucide="${t.icon}" class="w-3.5 h-3.5"></i><span>${t.label}</span>
                  </button>
                `).join('')}
              </div>
            </nav>
          </header>
          <main class="mx-auto max-w-6xl px-4 pb-16">
            <section class="mt-3">${renderActivePanel()}</section>
          </main>
          ${renderModal()}
          ${renderWhyModal()}
          ${renderInsightModal()}
          ${renderAnalystModal()}
          ${renderAIAgentModal()}
        `;
        if (window.lucide?.createIcons) { try { window.lucide.createIcons(); } catch {} }
        attachEvents();
        if (STATE.activeTab === 'solution') { attachAccordionKeyboard(); }
        if (STATE.activeTab === 'roi') { updateROIOutputs(); }
        if (STATE.activeTab === 'problems') {
          renderCapacityGapChart();
          if (Math.abs(STATE.currentDemandExponent - STATE.targetDemandExponent) > 0.001 || Math.abs(STATE.currentCapacitySlope - STATE.targetCapacitySlope) > 0.001) {
            requestAnimationFrame(animateCurves);
          }
        }
      }

      function chip(label,value,tone){
        const tones={emerald:'from-emerald-400/80 to-teal-400/80',sky:'from-sky-400/80 to-indigo-400/80',yellow:'from-yellow-300/90 to-amber-400/90'};
        return `<div class="section-card p-3"><div class="text-[11px] text-[#4A5568]">${label}</div><div class="mt-1 inline-flex items-center gap-2 rounded-[2px] bg-gradient-to-r px-2 py-0.5 text-slate-900 ${tones[tone]}"><i data-lucide="badge-check" class="w-4 h-4"></i><span class="text-sm font-semibold tabular-nums">${value}</span></div></div>`;
      }

      function renderActivePanel(){
        if (STATE.activeTab==='problems') return renderProblems();
        if (STATE.activeTab==='solution') return renderSolution();
        if (STATE.activeTab==='roi') return renderROI();
        return '';
      }

      function renderProblems(){
        return `
          <section id="panel-problems" class="space-y-2 cs-panel">
            <div class="flex items-center justify-between gap-3">
              <h2 class="cs-panel-title flex-1">The application layer is now the <span class="cs-panel-title-accent">#1 primary constraint</span> in modern <span class="analyst-trigger" data-action="open-analyst-modal">IT.</span></h2>
              <button type="button" data-action="open-currentstate-editor" class="w-7 h-7 rounded-full border-2 border-gray-300 bg-transparent text-gray-400 inline-flex items-center justify-center hover:text-[#0070F3] hover:border-[#0070F3] transition flex-shrink-0" title="Edit Current State"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-2 sm:grid-cols-4 cs-stats">
              ${STAT_CARDS.map(card => {
                const isFlipped = STATE.flippedCards[card.id];
                return '<div class="flip-card '+(isFlipped ? 'flipped' : '')+'" data-action="flip-card" data-card-id="'+card.id+'" role="button" tabindex="0" aria-label="'+card.title+'">'
                  +'<div class="flip-card-inner">'
                    +'<div class="flip-card-front section-card">'
                      +'<i data-lucide="'+card.icon+'" class="w-4 h-4 text-[#0070F3] flex-shrink-0"></i>'
                      +'<div class="flip-card-stat">'+card.stat+'</div>'
                      +'<div class="flip-card-tap">tap to reveal</div>'
                    +'</div>'
                    +'<div class="flip-card-back">'
                      +'<div>'
                        +'<div class="text-[10px] font-bold uppercase tracking-wide text-[#0070F3] mb-1.5">'+card.title+'</div>'
                        +'<p class="text-[10px] leading-relaxed text-[#475569] mb-1.5">'+card.body+'</p>'
                        +'<p class="text-[10px] leading-relaxed text-[#475569]">'+card.body2+'</p>'
                      +'</div>'
                      +'<div class="text-[8px] text-[#94a3b8] italic">'+card.source+'</div>'
                    +'</div>'
                  +'</div>'
                +'</div>';
              }).join('')}
            </div>
            <div class="section-card cs-chart-card">
              <div class="grid grid-cols-1 lg:grid-cols-[1fr_220px] gap-3 items-stretch">
                <div class="chart-container relative">
                  <svg id="capacity-gap-chart" viewBox="0 0 860 420" preserveAspectRatio="xMidYMid meet"></svg>
                </div>
                <div class="w-full bg-white/70 backdrop-blur-lg rounded-xl shadow-sm p-3 border border-slate-200 cs-challenges">
                  <h3 class="text-xs font-semibold uppercase tracking-wide text-[#0A1C60] mb-2">Modern IT Challenges</h3>
                  <div class="grid grid-cols-1 gap-2 items-stretch">
                    ${calloutDropdown('change','alert-triangle','Why Change','bg-slate-50')}
                    ${calloutDropdown('now','clock-4','Why Now','bg-slate-50', false, "")}
                    ${calloutDropdown('recast','sparkles','Why Recast','bg-slate-50', true)}
                  </div>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function renderCapacityGapChart(){
        const svg = document.getElementById('capacity-gap-chart');
        if (!svg) return;
        svg.innerHTML = '';
        svg.setAttribute('viewBox', '0 0 860 420');
        const width = 700, height = 310, margin = {left: 65, bottom: 50, top: 35, right: 95};
        const xScale = t => margin.left + t * width;
        const yScale = v => margin.top + height - v * height;
        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.innerHTML = `
          <linearGradient id="demandGradient" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#E04444"/><stop offset="100%" stop-color="#CC2222"/></linearGradient>
          <linearGradient id="capacityGradient" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0000CC"/><stop offset="100%" stop-color="#00BFFF"/></linearGradient>
          <linearGradient id="gapGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(204,34,34,0.14)"/><stop offset="100%" stop-color="rgba(0,0,204,0.04)"/></linearGradient>
          <linearGradient id="capFillGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,0,204,0.08)"/><stop offset="100%" stop-color="rgba(0,0,204,0.01)"/></linearGradient>
          <pattern id="gapHatch" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="9" stroke="#CC2222" stroke-width="1" stroke-opacity="0.10"/></pattern>
          <filter id="pillShadow" x="-20%" y="-40%" width="140%" height="180%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0000CC" flood-opacity="0.18"/></filter>
          <filter id="pillShadowRed" x="-20%" y="-40%" width="140%" height="180%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#CC2222" flood-opacity="0.28"/></filter>
          <filter id="pillShadowCyan" x="-20%" y="-40%" width="140%" height="180%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0000CC" flood-opacity="0.18"/></filter>
        `;
        svg.appendChild(defs);
        // Gridlines
        const gridG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        for (let i = 1; i <= 4; i++) { const y = margin.top + (height / 4) * i; gridG.innerHTML += '<line x1="'+margin.left+'" y1="'+y+'" x2="'+(margin.left+width)+'" y2="'+y+'" stroke="#EEF1FA" stroke-width="1"/>'; }
        svg.appendChild(gridG);

        let capacityPath = 'M '+xScale(0)+' '+yScale(0.3);
        const dPts = [], cPts = [];
        for (let i = 0; i <= 100; i++) { const t = i/100; const dem = Math.pow(t,exp); const cap = 0.3+slope*t; demandPath += ' L '+xScale(t)+' '+yScale(dem); capacityPath += ' L '+xScale(t)+' '+yScale(cap); dPts.push({x:xScale(t),y:yScale(dem)}); cPts.push({x:xScale(t),y:yScale(cap)}); }
        // Capacity area fill
        const capArea = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        capArea.setAttribute('d', capacityPath+' L '+xScale(1)+' '+yScale(0)+' L '+xScale(0)+' '+yScale(0)+' Z'); capArea.setAttribute('fill', 'url(#capFillGrad)'); capArea.classList.add('gap-element','chart-element'); svg.appendChild(capArea);
        // Gap fill (tinted)
        const gapD = dPts.map(function(p,i){return (i===0?'M':'L')+' '+p.x+' '+p.y;}).join(' ')+cPts.slice().reverse().map(function(p){return ' L '+p.x+' '+p.y;}).join('')+' Z';
        const gapEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        gapEl.setAttribute('d', gapD); gapEl.setAttribute('fill', 'url(#gapGradient)'); gapEl.classList.add('gap-element','chart-element'); svg.appendChild(gapEl);
        // Gap hatch overlay (very subtle red diagonals — reads as "growing pressure")
        const gapHatchEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        gapHatchEl.setAttribute('d', gapD); gapHatchEl.setAttribute('fill', 'url(#gapHatch)'); gapHatchEl.setAttribute('opacity', '0.85'); gapHatchEl.classList.add('gap-element','chart-element'); svg.appendChild(gapHatchEl);
        // Capacity line
        const capLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        capLine.setAttribute('d', capacityPath); capLine.setAttribute('stroke', 'url(#capacityGradient)'); capLine.setAttribute('fill', 'none'); capLine.classList.add('capacity-line','line-element','chart-element'); svg.appendChild(capLine);
        // Demand line (red)

        demLine.setAttribute('d', demandPath); demLine.setAttribute('stroke', 'url(#demandGradient)'); demLine.setAttribute('fill', 'none'); demLine.classList.add('demand-line','line-element','chart-element'); svg.appendChild(demLine);
        // (IT CAPACITY end pill removed per request)

        const decoG = document.createElementNS('http://www.w3.org/2000/svg', 'g');

        [[0.18,0.18],[0.74,0.85],[0.30,0.92]].forEach(function(p){

            + '<line x1="'+px+'" y1="'+(py-5)+'" x2="'+px+'" y2="'+(py+5)+'" stroke="#00BFFF" stroke-width="1.5" stroke-linecap="round"/>';
        });
        svg.insertBefore(decoG, svg.firstChild.nextSibling); // behind grid
        // Gap label
        const gapLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        gapLabel.setAttribute('x', xScale(0.45)); gapLabel.setAttribute('y', yScale(0.48)); gapLabel.setAttribute('text-anchor', 'middle'); gapLabel.classList.add('chart-annotation','label-element','chart-element'); gapLabel.textContent = STATE.chartConfig.center; svg.appendChild(gapLabel);
        // Driver markers with navy pill labels

            const t = (d.markerYear - 2025) / 3; const dem = Math.pow(t, exp); const x = xScale(t); const y = yScale(dem);
            const isHot = d.id && STATE.highlightDriverId === d.id;

            g.classList.add('marker-group','marker-element','chart-element');
            g.setAttribute('role','button'); g.setAttribute('tabindex','0'); g.setAttribute('aria-label','Learn more about '+d.label);

      function updateCurves(){
        if (STATE.recastMode) { STATE.targetDemandExponent = 1.55; STATE.targetCapacitySlope = 0.18; STATE.showTippingPoint = false; return; }
        let numNormal = 0, numAccelerating = 0;
        STATE.drivers.forEach(d => { if (d.state === 'normal') numNormal++; if (d.state === 'accelerating') numAccelerating++; });
        STATE.targetDemandExponent = 1.6 + (numNormal * 0.15 + numAccelerating * 0.3);
        STATE.targetDemandExponent = Math.min(Math.max(STATE.targetDemandExponent, 1.2), 3);
        STATE.targetCapacitySlope = 0;
        STATE.showTippingPoint = numAccelerating >= 3;
      }

      function animateCurves(){
        STATE.currentDemandExponent += (STATE.targetDemandExponent - STATE.currentDemandExponent) * 0.1;
        STATE.currentCapacitySlope += (STATE.targetCapacitySlope - STATE.currentCapacitySlope) * 0.1;
        renderCapacityGapChart();
        if (Math.abs(STATE.currentDemandExponent - STATE.targetDemandExponent) > 0.001 || Math.abs(STATE.currentCapacitySlope - STATE.targetCapacitySlope) > 0.001) { requestAnimationFrame(animateCurves); }
      }

      function setSlider(id, value){ const driver = STATE.drivers.find(d => d.id === id); if (driver) { driver.state = ['off', 'normal', 'accelerating'][value]; STATE.recastMode = false; updateCurves(); requestAnimationFrame(animateCurves); } }

      function renderChangeVelocityChart(){
        // Stacked area chart: 5 workload layers growing over 2015-2026, flat capacity line
        // Chart dimensions: viewBox 700x320, margin left 40, right 10, top 10, bottom 35
        const W = 700, H = 320, ml = 45, mr = 10, mt = 10, mb = 40;
        const cw = W - ml - mr, ch = H - mt - mb;
        // X positions for years 2015-2026 (12 points)
        const years = [2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025,2026];
        const x = years.map((y,i) => ml + (i / (years.length - 1)) * cw);
        const yP = v => mt + ch - v * ch; // value 0-1 to y pixel

        // 5 layers (values at each year, stacked from bottom). Each value is the layer's own height (not cumulative).
        // Layer 1: Platform management (steady base)
        const L1 = [0.08,0.09,0.10,0.11,0.13,0.15,0.17,0.19,0.21,0.23,0.25,0.27];
        // Layer 2: Packaging workload (grows from 2018+)
        const L2 = [0.04,0.04,0.05,0.06,0.08,0.10,0.13,0.16,0.19,0.22,0.24,0.26];
        // Layer 3: Security & compliance (accelerates from 2019+)
        const L3 = [0.02,0.02,0.03,0.03,0.04,0.07,0.09,0.11,0.13,0.15,0.17,0.19];
        // Layer 4: Migration projects (spikes from 2020+)
        const L4 = [0.01,0.01,0.01,0.02,0.02,0.04,0.06,0.09,0.11,0.13,0.14,0.15];
        // Layer 5: New tool adoption (adds from 2021+)
        const L5 = [0.00,0.00,0.01,0.01,0.01,0.02,0.04,0.06,0.08,0.10,0.12,0.13];

        // Cumulative stacks
        const S1 = L1.map(v => v);
        const S2 = L1.map((v,i) => v + L2[i]);
        const S3 = L1.map((v,i) => v + L2[i] + L3[i]);
        const S4 = L1.map((v,i) => v + L2[i] + L3[i] + L4[i]);
        const S5 = L1.map((v,i) => v + L2[i] + L3[i] + L4[i] + L5[i]);

        // Build area path between two stacks (bottom, top)

                ${stacks.map(([bot,top],i) => `<path d="${areaPath(bot,top)}" fill="${colors[i].fill}" stroke="${colors[i].stroke}" stroke-width="1.5"/>`).join('')}

              <!-- Y axis label -->
              <text x="14" y="${mt + ch/2}" text-anchor="middle" font-size="9" fill="#94a3b8" font-weight="600" font-family="Inter, system-ui, sans-serif" transform="rotate(-90,14,${mt+ch/2})">WORKLOAD</text>

            <div class="mt-3 bg-slate-50 border border-slate-200 rounded-lg p-3">
              <div class="text-xs font-bold text-[#0A1C60] mb-1">2022 &mdash; W365 + Intune co-management goes mainstream</div>
