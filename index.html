         frames advance in lockstep. Synchronicity IS the message. */
      function renderUserView(){
        const sc = STATE.flowScenarioIdx;
        const phase = STATE.flowPhase;
        const scenario = sc >= 0 && sc < SCENARIOS.length ? SCENARIOS[sc] : null;
        const appOpen = scenario && !['idle','launch','catalog','clicking'].includes(phase);
        const showCatalog = scenario && (phase === 'catalog' || phase === 'clicking');
        const showLaunch = scenario && phase === 'launch';
        const idle = !scenario || phase === 'idle';
        const firstOpen = appOpen && !STATE._firstOpenDone;
        if (firstOpen) STATE._firstOpenDone = true;
        const appWindowClass = appOpen ? (firstOpen ? 'open' : 'open-instant') : '';
        const msgClass = appOpen ? (firstOpen ? 'show' : 'show-instant') : '';
        const showThread = phase === 'final';

        // Compact Application Workspace catalog rendered inside each frame.
        // 12 icons keeps the grid readable inside small frames.
        const triCatalog = CATALOG_APPS.slice(0, 12);
        const catalogGrid = (frameId) => `
          <div class="ux-catalog-grid">
            ${triCatalog.map(app => {
              const isTeams = app.id === 'teams';
              const teamsCls = isTeams && (phase === 'clicking' || phase === 'catalog') ? 'ux-cat-teams-glow' : '';
              return `
                <div class="ux-cat-app ${isTeams && phase === 'clicking' ? 'clicked' : ''}">
                  <div class="ux-cat-icon ${teamsCls}" style="background:${app.color}">${app.letter}
                    ${isTeams && phase === 'clicking' ? '<span class="ux-click-pulse"></span>' : ''}
                  </div>
                  <span class="ux-cat-name">${app.name}</span>
                </div>
              `;
            }).join('')}
          </div>
        `;

        // Teams chat that fills each frame's content area.
        // Avatars are slightly smaller and message text is identical across all frames.
        const teamsContent = () => `
          <div class="ux-teams">
            <div class="ux-teams-side">
              <div class="ux-teams-side-dot active"><i data-lucide="message-square" class="w-3 h-3"></i></div>
              <div class="ux-teams-side-dot"><i data-lucide="users" class="w-3 h-3"></i></div>
              <div class="ux-teams-side-dot"><i data-lucide="calendar" class="w-3 h-3"></i></div>
              <div class="ux-teams-side-dot"><i data-lucide="phone" class="w-3 h-3"></i></div>
            </div>
            <div class="ux-teams-main">
              <div class="ux-teams-header"><i data-lucide="hash" class="w-3 h-3 text-slate-400"></i> General</div>
              <div class="ux-teams-body">
                <div class="ux-teams-msg ${msgClass}" style="transition-delay:${firstOpen ? '0.3s' : '0s'}">
                  <div class="ux-teams-avatar" style="background:#3b82f6">AK</div>
                  <div class="ux-teams-bubble">Q3 deck is ready for review</div>
                </div>
                <div class="ux-teams-msg ${msgClass}" style="transition-delay:${firstOpen ? '0.6s' : '0s'}">
                  <div class="ux-teams-avatar" style="background:#10b981">JR</div>
                  <div class="ux-teams-bubble">Pulling it up now</div>
                </div>
                <div class="ux-teams-msg ${msgClass}" style="transition-delay:${firstOpen ? '0.9s' : '0s'}">
                  <div class="ux-teams-bubble self">On it. Give me 5 min.</div>
                </div>
              </div>
            </div>
          </div>
        `;

        // The body of one frame switches with the global phase.
        const frameBody = () => {
          if (idle) {
            return `<div class="ux-frame-empty"><i data-lucide="layout-grid" class="w-5 h-5 text-slate-300"></i><span>Ready</span></div>`;
          }
          if (showLaunch) {
            return `<div class="ux-frame-launch">
              <div class="ux-frame-aw-mark"><i data-lucide="layout-grid" class="w-4 h-4 text-white"></i></div>
              <div class="ux-frame-launch-text">Application Workspace</div>
              <div class="ux-frame-launch-sub">Opening\u2026</div>
            </div>`;
          }
          if (showCatalog) {
            return `<div class="ux-frame-catalog">${catalogGrid()}</div>`;

      /* ════════════════════════════════════════════════════════════
         SS ANIMATION ENGINE — 3-act sequence (~13s total)
         Act 1 (3.6s): Catalog scale — vendor cascade + counter + ticker captions
         Act 2 (5.0s): Package depth — Adobe fields fill sequentially + badges
         Act 3 (4.0s): Custom inheritance — YourApp slides in, cyan lines draw, fields fill
         Final (1.6s): Combined fanout from one Setup Store source
         ════════════════════════════════════════════════════════════ */
      const SS_COUNTER_TARGET = 8047;

      function buildSsQueue(){
        const queue = [];
        const push = (delay, fn) => queue.push({ delay, fn });

        // ── ACT 1 ──────────────────────────────────────────────
        push(40, () => {
          STATE.ssAct = '1';
          STATE.ssCounter = 0;
          STATE.ssCaption = '';
          STATE.ssCaptionFinal = false;
          STATE.ssTickerIdx = -1;
          STATE.ssFieldStep = 0;
          STATE.ssBadgesAdobe = false;
          STATE.ssYourCardIn = false;
          STATE.ssAdobeShifted = false;
          STATE.ssTickerHistory = [];
          STATE.ssInheritStep = 0;
          STATE.ssBadgesYour = false;
          scrollPreserveRender();
          ssTweenCounter(0, SS_COUNTER_TARGET, 1500);
          ssTickerStart();
        });
        // Ticker resolves to closing caption (~3.0s in)
        push(3000, () => {
          ssTickerStop();
          STATE.ssCaption = '8,047 apps. Packaged. Updated. Patched. Daily.';
          STATE.ssCaptionFinal = true;
          scrollPreserveRender();
        });

        // ── ACT 2 ──────────────────────────────────────────────
        push(900, () => {
          STATE.ssAct = '2';
          STATE.ssCaption = SS_PACKAGE_FIELDS[0].capAdobe;
          STATE.ssCaptionFinal = false;
          STATE.ssFieldStep = 0;
          scrollPreserveRender();
        });
        // 8 fields, ~280ms apart
        for (let i = 0; i < SS_PACKAGE_FIELDS.length; i++) {
          push(280, () => {
            STATE.ssFieldStep = i + 1;
            const next = SS_PACKAGE_FIELDS[i + 1];
            if (next) {
              STATE.ssCaption = next.capAdobe;
            }
            scrollPreserveRender();
          });
        }
        push(360, () => {
          STATE.ssBadgesAdobe = true;
          STATE.ssCaption = 'All 8 packaging steps complete. Per app. Per day. Times 8,000.';
          STATE.ssCaptionFinal = true;
          scrollPreserveRender();
        });

        // ── ACT 3 ──────────────────────────────────────────────
        push(1100, () => {
          STATE.ssAct = '3';
          STATE.ssAdobeShifted = true;
          STATE.ssYourCardIn = true;
          STATE.ssCaption = SS_PACKAGE_FIELDS[0].capYour;
          STATE.ssCaptionFinal = false;
          STATE.ssInheritStep = 0;
          scrollPreserveRender();
        });
        // Wait for slide-in to settle, then draw inheritance lines + fill fields
        push(420, () => {
          ssDrawInheritLines();
        });
        for (let i = 0; i < SS_PACKAGE_FIELDS.length; i++) {
          push(310, () => {
            STATE.ssInheritStep = i + 1;
            const next = SS_PACKAGE_FIELDS[i + 1];
            if (next) {
              STATE.ssCaption = next.capYour;
            }
            scrollPreserveRender();
            // Re-draw lines so newly-filled targets connect cleanly
            requestAnimationFrame(() => ssDrawInheritLines());
          });
        }
        push(360, () => {
          STATE.ssBadgesYour = true;
          STATE.ssCaption = 'Your custom apps. OEM-grade pipeline. Same tools we use on the 8,000.';
          STATE.ssCaptionFinal = true;
          scrollPreserveRender();
          requestAnimationFrame(() => ssDrawInheritLines());
        });

        // ── FINAL beat ────────────────────────────────────────
        push(1100, () => {
          STATE.ssAct = 'final';
          STATE.ssCaption = '';
          STATE.ssCaptionFinal = false;
          scrollPreserveRender();
        });
        push(1200, () => {
          STATE.ssAct = 'done';
          STATE.ssCaption = 'One pipeline. Commercial apps and yours. Same delivery, same quality, same speed.';
          STATE.ssCaptionFinal = true;
          scrollPreserveRender();
        });
        push(800, () => {
          STATE.ssRunning = false;
          STATE.ssPaused = false;
          scrollPreserveRender();
        });

        return queue;
      }

      /* Counter tween — RAF-driven */
      function ssTweenCounter(from, to, durationMs){
        if (STATE.ssCounterRaf) cancelAnimationFrame(STATE.ssCounterRaf);
        const t0 = performance.now();
        const ease = (t) => 1 - Math.pow(1 - t, 3); // easeOutCubic
        const tick = (now) => {
          if (STATE.ssPaused) {
            STATE.ssCounterRaf = requestAnimationFrame(tick);
            return;
          }
          const t = Math.min(1, (now - t0) / durationMs);
          STATE.ssCounter = Math.round(from + (to - from) * ease(t));
          // Update only the counter text node (avoid full re-render every frame)
          const el = document.querySelector('.ss-counter-big');
          if (el) el.textContent = STATE.ssCounter.toLocaleString();
          if (t < 1) {
            STATE.ssCounterRaf = requestAnimationFrame(tick);
          } else {
            STATE.ssCounterRaf = null;
          }
        };
        STATE.ssCounterRaf = requestAnimationFrame(tick);
      }

      /* Ticker — pushes a vendor-tagged "packaged" entry into the live rail every ~700ms */
      function ssTickerStart(){
        ssTickerStop();
        STATE.ssTickerHistory = STATE.ssTickerHistory || [];
        let i = 0;
        const tick = () => {
          if (STATE.ssAct !== '1' || STATE.ssCaptionFinal || STATE.ssPaused) return;
          const vendor = SS_VENDORS[i % SS_VENDORS.length];
          const appName = SS_TICKER_APPS[i % SS_TICKER_APPS.length].replace(/:\s*packaged$/i, '');
          STATE.ssTickerHistory.push({ l: vendor.l, c: vendor.c, n: appName });
          // Keep only last 6 to bound memory; render shows last 4
          if (STATE.ssTickerHistory.length > 6) STATE.ssTickerHistory.shift();
          // Targeted DOM update — re-render only the ticker list
          const list = document.querySelector('.ss-ticker-list');
          if (list) {
            const recent = STATE.ssTickerHistory.slice(-4);
            list.innerHTML = recent.map((e, ri) => `
              <div class="ss-ticker-row" style="--row-idx:${ri};--row-total:${recent.length}">
                <div class="ss-ticker-icon" style="background:${e.c}">${e.l}</div>
                <div class="ss-ticker-name">${e.n}</div>
                <i data-lucide="check-circle-2" class="ss-ticker-check w-3 h-3"></i>
              </div>
            `).join('');
            if (window.lucide) lucide.createIcons({ nameAttr: 'data-lucide', attrs: { class: 'lucide' } });
          }
          i++;
          STATE._ssTickerTimer = setTimeout(tick, 700);
        };
        tick();
      }
      function ssTickerStop(){
        if (STATE._ssTickerTimer) { clearTimeout(STATE._ssTickerTimer); STATE._ssTickerTimer = null; }
      }

      /* Draw cyan inheritance lines from Adobe fields → YourApp fields (SVG) */
      function ssDrawInheritLines(){
        const svg = document.getElementById('ss-inherit-svg');
        if (!svg) return;
        const stage = svg.parentElement;
        if (!stage) return;
        const sRect = stage.getBoundingClientRect();
        // Match SVG coordinate space to the stage
        svg.setAttribute('viewBox', `0 0 ${sRect.width} ${sRect.height}`);
        svg.style.width = sRect.width + 'px';
        svg.style.height = sRect.height + 'px';

        const adobe = stage.querySelectorAll('#ss-fields-adobe .ss-field');
        const your  = stage.querySelectorAll('#ss-fields-your  .ss-field');
        const step = STATE.ssInheritStep || 0;

        // Clear and re-draw every render so positions stay correct on resize/shift
        svg.innerHTML = '';
        const ns = 'http://www.w3.org/2000/svg';
        for (let i = 0; i < step && i < adobe.length && i < your.length; i++) {
          const aR = adobe[i].getBoundingClientRect();
          const yR = your[i].getBoundingClientRect();
          const x1 = aR.right - sRect.left;
          const y1 = aR.top + aR.height / 2 - sRect.top;
          const x2 = yR.left - sRect.left;
          const y2 = yR.top + yR.height / 2 - sRect.top;
          const cx = (x1 + x2) / 2;
          const d = `M ${x1.toFixed(1)} ${y1.toFixed(1)} C ${cx.toFixed(1)} ${y1.toFixed(1)}, ${cx.toFixed(1)} ${y2.toFixed(1)}, ${x2.toFixed(1)} ${y2.toFixed(1)}`;
          const path = document.createElementNS(ns, 'path');
          path.setAttribute('d', d);
          path.setAttribute('class', 'ss-inherit-line');
          // Approximate path length for stroke-dasharray
          const len = Math.hypot(x2 - x1, y2 - y1) + 40;
          path.style.setProperty('--len', len.toFixed(0));
          path.style.animationDelay = `${i * 30}ms`;
          svg.appendChild(path);
        }
      }
      // Redraw on window resize while animating
      window.addEventListener('resize', () => {
        if (STATE.ssAct === '3' || STATE.ssAct === 'final' || STATE.ssAct === 'done') {

      function runSsQueue(){

      function calculateImpact(){
        const ci = STATE.calcInputs;
        const a = ROI_ASSUMPTIONS[STATE.calcScenario];
        const currentSupportHours = round((ci.monthlyTickets * ci.avgTicketMins) / 60);
        const ticketHoursReturned = round(currentSupportHours * a.ticketReduction);
        const ticketsAvoided = Math.round(ci.monthlyTickets * a.ticketReduction);
        const pkgHoursReturned = round(ci.pkgHours * a.pkgReduction);
        const patchHoursReturned = round(ci.patchHours * a.patchReduction);
        const totalHoursMonth = round(ticketHoursReturned + pkgHoursReturned + patchHoursReturned);
        const totalHoursYear = round(totalHoursMonth * 12);
        const fteCapacity = round(totalHoursYear / a.fteHours);
        const strategicHours = Math.round(totalHoursYear * a.strategicRealloc);
        const reqsDeferred = ci.openReqs > 0 ? Math.min(ci.openReqs, Math.floor(fteCapacity)) : 0;
        const delayedInitiatives = ci.delayedInitiatives;
        const supportCostAnnual = Math.round(currentSupportHours * 90 * 12);
        const engineeringCostAnnual = Math.round((ci.pkgHours + ci.patchHours) * 120 * 12);
        const wasteCostAnnual = Math.round((supportCostAnnual + engineeringCostAnnual) * 0.25);
        const totalBurnAnnual = supportCostAnnual + engineeringCostAnnual + wasteCostAnnual;
        const totalRecoveredAnnual = Math.round((ticketHoursReturned * 90 + (pkgHoursReturned + patchHoursReturned) * 120) * 12);
        const monthlyCostOfWaiting = Math.round(totalRecoveredAnnual / 12);
        STATE.calcResult = { currentSupportHours, ticketHoursReturned, ticketsAvoided, pkgHoursReturned, patchHoursReturned, totalHoursMonth, totalHoursYear, fteCapacity, strategicHours, reqsDeferred, delayedInitiatives, supportCostAnnual, engineeringCostAnnual, wasteCostAnnual, totalBurnAnnual, totalRecoveredAnnual, monthlyCostOfWaiting };

        root.addEventListener('input', (e) => {
          if (e.target?.id === 'roi-employees') { const n = cleanNum(e.target.value); if (n > 0) { deriveFromEmployees(n); calculateImpact(); clearTimeout(_roiDebounce); _roiDebounce = setTimeout(() => render(), 600); } return; }
          if (e.target?.id === 'roi-users') { STATE.calcInputs.users = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-endpoints') { STATE.calcInputs.endpoints = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-envs') { STATE.calcInputs.envs = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-apps') { STATE.calcInputs.apps = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-custom') { STATE.calcInputs.customApps = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-tickets') { STATE.calcInputs.monthlyTickets = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-ticketmins') { STATE.calcInputs.avgTicketMins = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-pkghrs') { STATE.calcInputs.pkgHours = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-patchhrs') { STATE.calcInputs.patchHours = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-reqs') { STATE.calcInputs.openReqs = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-initiatives') { STATE.calcInputs.delayedInitiatives = cleanNum(e.target.value); return; }
          const buf = e.target.closest('[data-action="edit-buffer"]');
          if (buf) { const key = buf.getAttribute('data-key'); const sub = buf.getAttribute('data-subkey'); if (STATE.editBuffers?.[key]) STATE.editBuffers[key][sub] = e.target.value; }
          if (STATE.modalOpen && STATE.editTab === 'chart') { STATE.editChartBuffer = readChartFieldsRaw(); }
        });
        const pdfInput = document.getElementById('pdf-company-input');
        if (pdfInput) { pdfInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); const name = (pdfInput.value || '').trim() || 'Your Organization'; STATE.pdfCompanyName = name; generatePDF(name); STATE.pdfCompanyInput = false; render(); } }); }
      }

      let accordionKeyboardBound = false;
      function attachAccordionKeyboard(){
        if (accordionKeyboardBound) return; accordionKeyboardBound = true;
        document.addEventListener('keydown', (e) => {
          const target = e.target; if (!target || !target.classList || !target.classList.contains('accordion-header')) return;
          const headers = Array.from(document.querySelectorAll('.accordion-header')); const idx = headers.indexOf(target);
          if (e.key === 'ArrowDown') { headers[(idx + 1) % headers.length]?.focus(); e.preventDefault(); }
          else if (e.key === 'ArrowUp') { headers[(idx - 1 + headers.length) % headers.length]?.focus(); e.preventDefault(); }
          else if (e.key === 'Home') { headers[0]?.focus(); e.preventDefault(); }
          else if (e.key === 'End') { headers[headers.length - 1]?.focus(); e.preventDefault(); }
          else if (e.key === 'Enter' || e.key === ' ') { target.click(); e.preventDefault(); }
        });
      }

      STATE.drivers.forEach(d => d.state = 'accelerating');
      STATE.showTippingPoint = true;
      updateCurves();
      STATE.currentDemandExponent = STATE.targetDemandExponent;
      STATE.currentCapacitySlope = STATE.targetCapacitySlope;

      deriveFromEmployees(STATE.calcInputs.users);
      calculateImpact();
      document.addEventListener('DOMContentLoaded', render);
      document.addEventListener('keydown',(e)=>{ if(e.key==='Escape' && (STATE.modalOpen || STATE.openWhyModal || STATE.insightContent || STATE.showAnalystModal || STATE.showAIAgent)){ if (STATE.openWhyModal && STATE._savedDriverStates) { STATE.drivers.forEach((d, i) => { d.state = STATE._savedDriverStates[i]; }); STATE.showTippingPoint = STATE._savedTippingPoint; STATE.recastMode = STATE._savedRecastMode; STATE.targetDemandExponent = STATE._savedDemandExp; STATE.targetCapacitySlope = STATE._savedCapSlope; STATE._savedDriverStates = null; updateCurves(); requestAnimationFrame(animateCurves); } STATE.modalOpen=false; STATE.openWhyModal=null; STATE.insightContent=null; STATE.highlightDriverId=null; STATE.showAnalystModal=false; STATE.showAIAgent=false; render(); } });
    </script>
  </body>
</html>
