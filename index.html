<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Recast -  Compact Click-Through (Realistic Catalog)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://unpkg.com">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>


    <style>
      :root {
        --bg-main: #f9fafb;
        --text-primary: #111827;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --radius: 1rem;
        --border-subtle: #e5e7eb;
        --shadow-card: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        --shadow-hover: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      }
      html, body {
        background: var(--bg-main);
        color: var(--text-primary);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .focus-ring:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
      .section-card { border-radius: var(--radius); background: #ffffff; box-shadow: var(--shadow-card); transition: box-shadow 300ms ease, transform 300ms ease; }
      .section-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
      .sub-card { border-radius: calc(var(--radius) / 1.5); border: 1px solid var(--border-subtle); background: #f9fafb; transition: box-shadow 300ms ease; }
      .tile { width: 0.45rem; height: 0.45rem; border-radius: 2px; background: #e5e7eb; opacity: 0.9; }
      .run .tile { animation: tilePulse 1s ease-in-out var(--d, 0s) 1 forwards; }
      @keyframes tilePulse { 0% { transform: scale(0.7); background: #e5e7eb; opacity: 0.4; } 60% { transform: scale(1); background: var(--primary); opacity: 1; } 100% { background: #e5e7eb; opacity: 0.9; } }
      .flow-bar { height: 0.22rem; border-radius: 2px; transform-origin: left center; transform: scaleX(0); }
      .run .flow-bar { animation: barGrow 0.9s ease forwards var(--d, 0s); }
      @keyframes barGrow { to { transform: scaleX(1); } }
      .bolt-line { width: 0.22rem; border-radius: 2px; transform-origin: top center; transform: scaleY(0); }
      .run .bolt-line { animation: boltDrop 0.9s ease forwards var(--d, 0s); }
      @keyframes boltDrop { to { transform: scaleY(1); } }
      .logo-ring { width: 2.1rem; height: 2.1rem; border-radius: 9999px; display: grid; place-items: center; background: #ffffff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); transition: all 0.3s ease; }
      .logo-ring:hover { box-shadow: 0 0 8px rgba(37,99,235,0.3); transform: scale(1.05); }
      .logo-wrap { display: flex; align-items: center; gap: 0.4rem; position: relative; transition: all 300ms ease; }
      .logo-name { font-size: 0.7rem; color: #6b7280; opacity: 0; transform: translateX(-10px); transition: all 0.3s ease; }
      .show-labels .logo-wrap { flex-direction: column; align-items: flex-start; gap: 0.2rem; }
      .show-labels .logo-name { opacity: 1; transform: translateX(0); white-space: normal; text-align: left; }
      .show-labels .logo-wrap .logo-ring { width: 1.8rem; height: 1.8rem; }
      .run .logo-ring { animation: appLiftPulse 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) var(--d, 0s) 1 forwards; }
      @keyframes appLiftPulse { 0% { transform: translateY(0) scale(1); filter: saturate(0.4); opacity: 0.65; } 30% { transform: translateY(-4px) scale(1.05); } 60% { transform: translateY(-2px) scale(1.02); filter: saturate(1); opacity: 1; } 100% { transform: translateY(0) scale(1); } }
      .user-beam { height: 0.38rem; border-radius: 2px; transform-origin: left center; transform: scaleX(0); }
      .run .user-beam { animation: barGrow 1s ease forwards var(--d, 0s); }
      .badge { width: 1.15rem; height: 1.15rem; border-radius: 9999px; opacity: 0; transform: translateY(-6px) scale(0.9); }
      .run .badge { animation: badgeDrop 0.8s ease-out var(--d, 0s) forwards; }
      @keyframes badgeDrop { to { opacity: 1; transform: translateY(0) scale(1); } }
      .cat-row { display: grid; grid-template-columns: 15ch 1fr; gap: 0.5rem; align-items: center; border-top: 1px solid #e5e7eb; padding-top: 0.5rem; transition: all 300ms ease; }
      .cat-row:first-child { border-top: none; padding-top: 0; }
      .cat-title { font-size: 0.7rem; letter-spacing: 0.08em; display: flex; align-items: center; gap: 0.5rem; }
      .re-primary { background: var(--primary) !important; color: #fff !important; border: 0; border-radius: 9999px; padding: 0.5rem 1.5rem; transition: background 0.2s ease, transform 0.2s ease; }
      .re-primary:hover { background: var(--primary-hover) !important; transform: scale(1.02); }
      .re-primary:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
      .re-secondary { background: transparent !important; color: var(--text-primary) !important; border: 2px solid var(--text-primary) !important; border-radius: 9999px; padding: 0.5rem 1.5rem; transition: all 0.2s ease, transform 0.2s ease; }
      .re-secondary:hover { color: var(--primary) !important; border-color: var(--primary) !important; transform: scale(1.02); }
      @media (prefers-reduced-motion: reduce) {
        .accordion-content { transition: none !important; }
      }
      .modal-overlay { transition: opacity 300ms ease; }
      .modal-content { transition: transform 300ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 300ms ease; }
      .modal-open .modal-content { transform: scale(1); opacity: 1; }
      .modal-closed .modal-content { transform: scale(0.95); opacity: 0; }
      .check-appear{opacity:0;animation:fadeInOut 1.5s ease var(--d,0s) forwards}
      @keyframes fadeInOut{0%{opacity:0}30%{opacity:1}70%{opacity:1}100%{opacity:0}}
      .flow-connect{background-image:linear-gradient(to right, transparent 50%, #e5e7eb 50%);background-size:4px 1px;background-repeat:repeat-x;height:1px;opacity:0.5}
      .end-user-expand{transition:all 0.5s ease;transform:scale(1.05);background:#ffffff;border-color:#10b981}
      .icon-launch{animation:iconLaunch 0.5s ease forwards}
      @keyframes iconLaunch{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
      .tagline-fade{opacity:0;animation:fadeIn 1s ease 10s forwards}
      @keyframes fadeIn{to{opacity:1}}
      .overlay-tag{opacity:0;transition:opacity 0.3s ease;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,0.9);padding:1rem;border-radius:var(--radius);box-shadow:var(--shadow-card);z-index:10}
      .show-labels .overlay-tag{opacity:1;transition-delay:0.5s}
      .meta-label{font-size:0.6rem;color:#6b7280;opacity:0;transform:translateY(5px);transition:all 0.3s ease;position:relative;top:auto;left:auto;z-index:5;white-space:nowrap;display:flex;flex-direction:column;gap:0.1rem;align-items:flex-start;width:100%;justify-content:flex-start}
      .show-labels .meta-label{opacity:1;transform:translateY(0)}
      .show-labels .cat-row{grid-template-columns:15ch 1fr;gap:1rem}
      .show-labels #flowCard .flex-wrap{gap:1rem}
      .show-labels .logo-wrap{width:calc(33.333% - 0.666rem);margin-bottom:0.5rem}
      .env-wrap { display: flex; align-items: center; gap: 0.2rem; position: relative; transition: all 300ms ease; width: calc(16.666% - 0.5rem); flex-direction: column; }
      .env-name { font-size: 0.7rem; color: #6b7280; opacity: 1; transform: translateY(0); transition: all 0.3s ease; white-space: nowrap; text-align: center; }
      .env-ring { width: 1.8rem; height: 1.8rem; }
      .run .env-ring { animation: envPulse 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) var(--d, 0s) 1 forwards; }
      @keyframes envPulse { 0% { transform: scale(1); filter: saturate(0.4); opacity: 0.65; box-shadow: 0 0 0 rgba(37,99,235,0); } 30% { transform: scale(1.05); box-shadow: 0 0 12px rgba(37,99,235,0.5); } 60% { transform: scale(1.02); filter: saturate(1); opacity: 1; box-shadow: 0 0 8px rgba(37,99,235,0.3); } 100% { transform: scale(1); box-shadow: 0 0 0 rgba(37,99,235,0); } }
      .arrow-line { height: 1.5rem; width: 0.15rem; background: linear-gradient(to bottom, #e5e7eb, #2563eb); transform-origin: top center; transform: scaleY(0); margin: 0 auto; position: relative; }
      .arrow-line::after { content: ''; position: absolute; bottom: -0.3rem; left: -0.25rem; border-left: 0.4rem solid transparent; border-right: 0.4rem solid transparent; border-top: 0.6rem solid #1d4ed8; opacity: 0; transition: opacity 0.3s; }
      .run .arrow-line { animation: arrowDrop 0.8s ease forwards var(--d, 0s); }
      .run .arrow-line::after { animation: arrowTip 0.8s ease forwards var(--d, 0s); }
      @keyframes arrowDrop { 0% { transform: scaleY(0); } 100% { transform: scaleY(1); } }
      @keyframes arrowTip { 0% { opacity: 0; } 80% { opacity: 0; } 100% { opacity: 1; } }
      .hub-card { opacity: 0; transform: translateY(10px); transition: all 0.5s ease; }
      .run .hub-card { animation: hubAppear 0.8s ease forwards var(--d, 2.5s); }
      @keyframes hubAppear { to { opacity: 1; transform: translateY(0); } }
      .metrics-banner { opacity: 0; transform: translateY(10px); transition: all 0.5s ease; text-align: center; font-size: 0.9rem; font-weight: 500; color: #111827; }
      .run .metrics-banner { animation: metricsAppear 0.8s ease forwards var(--d, 3.5s); }
      @keyframes metricsAppear { to { opacity: 1; transform: translateY(0); } }
      .interactive-node { transition: opacity 0.3s, transform 0.3s; }
      .interactive-node:hover { opacity: 0.9; transform: scale(1.05); }
      .chart-container { width: 100%; height: auto; aspect-ratio: 860 / 420; background: #ffffff; border-radius: 16px; padding: 8px; }
      #capacity-gap-chart { width: 100%; height: 100%; }
      .chart-text { font-size: 11px; font-weight: 600; fill: var(--r-ink); letter-spacing: 0.01em; font-family: Inter, system-ui, sans-serif; }
      .chart-axis { stroke: #DDDDEE; stroke-width: 1; }
      .chart-axis-label { font-size: 17px; font-weight: 800; fill: var(--r-blue); font-family: Inter, system-ui, sans-serif; letter-spacing: 0.10em; text-transform: uppercase; }
      .chart-year-label { font-size: 12px; fill: var(--r-ink-2); font-weight: 600; font-family: Inter, system-ui, sans-serif; }
      .chart-annotation { font-size: 17px; font-weight: 800; fill: var(--r-blue); font-family: Inter, system-ui, sans-serif; letter-spacing: 0.10em; text-transform: uppercase; }
      .demand-line { stroke-width: 3.25; filter: drop-shadow(0 2px 10px rgba(204,34,34,0.32)); stroke-linecap: round; }
      .capacity-line { stroke-width: 3.5; stroke-linecap: round; filter: drop-shadow(0 2px 6px rgba(0,0,204,0.22)); }
      .marker-group { cursor: pointer; transition: transform 0.15s ease; }
      .marker-group:hover { transform: scale(1.08); }
      .chart-element { opacity: 0; animation: chartFadeIn 0.6s ease forwards; }
      @keyframes chartFadeIn { from { opacity: 0; } to { opacity: 1; } }
      .axis-element { animation-delay: 0s; }
      .line-element { animation-delay: 0.2s; }
      .gap-element { animation-delay: 0.4s; }
      .marker-element { animation-delay: 0.6s; }
      .label-element { animation-delay: 0.8s; }
      .analyst-trigger { cursor: pointer; border-bottom: 2px dashed #0070F3; padding-bottom: 1px; }

      :root{
        --bg-main:
          radial-gradient(1200px 700px at 18% 0%, rgba(37,99,235,0.10), transparent 58%),
          radial-gradient(900px 560px at 92% 28%, rgba(16,185,129,0.07), transparent 60%),
          linear-gradient(180deg, #fbfdff 0%, #f7f8fb 55%, #f9fafb 100%);
        --shadow-card:
          0 2px 10px rgba(15, 23, 42, 0.06),
          0 1px 3px rgba(15, 23, 42, 0.04);
        --shadow-hover:
          0 14px 36px rgba(15, 23, 42, 0.10),
          0 4px 12px rgba(15, 23, 42, 0.06);
        --shadow-elevated:
          0 28px 70px rgba(15, 23, 42, 0.18),
          0 10px 24px rgba(15, 23, 42, 0.10);
        --re-green: #10b981;
      }

      html, body { background: var(--bg-main); background-attachment: fixed; }

      .section-card{
        background: rgba(255,255,255,0.88);
        border: 1px solid rgba(226,232,240,0.70);
      }

      .glass{
        background: rgba(255,255,255,0.72) !important;
        border: 1px solid rgba(255,255,255,0.55);
        box-shadow: var(--shadow-elevated) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }
      .glass-soft{
        background: rgba(255,255,255,0.62) !important;
        border: 1px solid rgba(255,255,255,0.50);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .modal-overlay{ background: rgba(2,6,23,0.55) !important; }
      .modal-content{ box-shadow: var(--shadow-elevated) !important; }

      .demand-line, .capacity-line{ stroke-linecap: round; stroke-linejoin: round; }

      .marker-group{
        transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
      }
      .marker-group:hover{
        filter: drop-shadow(0 10px 18px rgba(37,99,235,0.22));
        transform: translateY(-1px) scale(1.02);
      }

      @media (prefers-reduced-motion: reduce){
        .marker-group, .section-card, .logo-ring { transition: none !important; animation: none !important; }
      }

      .device-frame { background: #1e293b; border-radius: 12px; padding: 6px; box-shadow: 0 8px 30px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.05); position: relative; overflow: hidden; }
      .device-screen { background: #f8fafc; border-radius: 8px; overflow: hidden; }
      .device-titlebar { background: linear-gradient(180deg, #f1f5f9, #e2e8f0); padding: 6px 12px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #cbd5e1; }
      .device-dot { width: 8px; height: 8px; border-radius: 50%; }
      .device-dot-r { background: #ef4444; }
      .device-dot-y { background: #eab308; }
      .device-dot-g { background: #22c55e; }
      .device-titlebar-text { font-size: 11px; color: #64748b; margin-left: 8px; font-weight: 500; }
      .catalog-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 12px; }
      .catalog-app { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: default; padding: 5px 2px; border-radius: 8px; transition: all 0.2s ease; position: relative; }
      .catalog-app:hover { background: #f1f5f9; }
      .catalog-app.clicked { background: #eff6ff; transform: scale(0.95); }
      .catalog-app .app-icon { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; font-weight: 800; font-size: 12px; color: white; transition: all 0.3s ease; position: relative; }
      .catalog-app .app-name { font-size: 8px; color: #475569; text-align: center; line-height: 1.1; }
      .catalog-app.clicked .app-icon { box-shadow: 0 0 0 3px rgba(0,112,243,0.4); }
      @keyframes clickRing { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }
      .click-ring { position: absolute; inset: 0; border-radius: 8px; border: 2px solid #0070F3; animation: clickRing 0.6s ease-out forwards; pointer-events: none; }

      /* ============================================================
         USER EXPERIENCE — Three synchronized device frames
         Synchronicity is the message. All three frames advance in
         lockstep with STATE.flowPhase. Cyan accent (#00BFFF) is the
         brand thread that ties Windows · macOS · Cloud PC together.
         ============================================================ */
      .ux-tri-card { position: relative; }
      .ux-tri {
        display: grid; grid-template-columns: repeat(3, 1fr);
        gap: 14px; position: relative; padding-bottom: 8px;
      }
      @media (max-width: 860px) { .ux-tri { grid-template-columns: 1fr; gap: 16px; } }

      /* Each device card: tag → chrome → stage → chrome */
      .ux-device {
        display: flex; flex-direction: column; gap: 6px;
        animation: uxDeviceIn 720ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .ux-device:nth-child(1) { animation-delay: 60ms; }
      .ux-device:nth-child(2) { animation-delay: 60ms; }   /* sync — same delay */
      .ux-device:nth-child(3) { animation-delay: 60ms; }   /* sync — same delay */
      @keyframes uxDeviceIn {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .ux-device-tag {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
        text-transform: uppercase; color: #475569;
        align-self: flex-start;
      }
      .ux-device-tag i { color: var(--r-blue, #0000CC); }

      /* The frame is the OS-styled bezel + content stage */
      .ux-frame {
        background: #0f172a;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.18),
                    0 1px 0 rgba(255,255,255,0.06) inset;
        display: flex; flex-direction: column;
        min-height: 260px;
      }

      /* Stage — the actual app content area, identical layout in every frame */
      .ux-stage {
        flex: 1; min-height: 180px;
        display: flex; flex-direction: column; justify-content: center;
        position: relative; overflow: hidden;
      }

      /* Frame body states */
      .ux-frame-empty {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 8px; color: rgba(255,255,255,0.6);
        font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      }
      .ux-frame-launch {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 8px;
        animation: uxLaunchIn 600ms ease-out;
      }
      @keyframes uxLaunchIn { from { opacity: 0; } to { opacity: 1; } }
      .ux-frame-aw-mark {
        width: 38px; height: 38px; border-radius: 9px;
        background: linear-gradient(135deg, var(--r-blue, #0000CC), var(--r-cyan, #00BFFF));
        display: grid; place-items: center;
        box-shadow: 0 0 0 0 rgba(0, 191, 255, 0.55), 0 4px 14px rgba(0, 0, 204, 0.4);
        animation: uxAwPulse 1.2s ease-out infinite;
      }
      @keyframes uxAwPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(0, 191, 255, 0.55), 0 4px 14px rgba(0, 0, 204, 0.4); }
        50%      { box-shadow: 0 0 0 8px rgba(0, 191, 255, 0), 0 4px 14px rgba(0, 0, 204, 0.4); }
      }
      .ux-frame-launch-text {
        font-size: 11px; font-weight: 700; color: white;
        letter-spacing: 0.04em;
      }
      .ux-frame-launch-sub {
        font-size: 9px; color: rgba(255,255,255,0.65);
        letter-spacing: 0.06em; text-transform: uppercase;
      }

      .ux-frame-catalog {
        flex: 1; padding: 10px 10px;
        background: rgba(255,255,255,0.96);
        display: flex; flex-direction: column;
        animation: uxCatalogIn 400ms ease-out;
      }
      @keyframes uxCatalogIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
      .ux-catalog-grid {
        display: grid; grid-template-columns: repeat(4, 1fr);
        gap: 8px 6px;
      }
      .ux-cat-app {
        display: flex; flex-direction: column; align-items: center;
        gap: 3px; cursor: default;
      }
      .ux-cat-icon {
        width: 28px; height: 28px; border-radius: 7px;
        display: grid; place-items: center;
        font-size: 11px; font-weight: 800; color: white;
        position: relative; box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .ux-cat-name {
        font-size: 8px; color: #334155; font-weight: 600;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        max-width: 100%; text-align: center;
      }
      /* Teams icon glow during catalog/clicking — synced across frames */
      .ux-cat-teams-glow {
        box-shadow: 0 0 0 2px rgba(0, 191, 255, 0.55),
                    0 0 14px 2px rgba(0, 191, 255, 0.45),
                    0 2px 6px rgba(0,0,0,0.12);
        animation: uxTeamsGlow 1.4s ease-in-out infinite;
      }
      @keyframes uxTeamsGlow {
        0%, 100% { box-shadow: 0 0 0 2px rgba(0,191,255,0.55), 0 0 12px 2px rgba(0,191,255,0.4), 0 2px 6px rgba(0,0,0,0.12); }
        50%      { box-shadow: 0 0 0 3px rgba(0,191,255,0.85), 0 0 20px 4px rgba(0,191,255,0.6), 0 2px 6px rgba(0,0,0,0.12); }
      }
      .ux-cat-app.clicked .ux-cat-icon { transform: scale(1.06); }
      /* Click pulse — cyan ring expanding from Teams icon. Identical timing in every frame. */
      .ux-click-pulse {
        position: absolute; inset: -2px; border-radius: 8px;
        border: 2px solid var(--r-cyan, #00BFFF);
        animation: uxClickPulse 700ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
        pointer-events: none;
      }
      @keyframes uxClickPulse {
        0%   { transform: scale(0.85); opacity: 1; }
        100% { transform: scale(2.1); opacity: 0; }
      }

      /* Teams app inside frame */
      .ux-frame-app {
        flex: 1; background: #ffffff; display: flex;
        opacity: 0; transform: translateY(8px) scale(0.985);
        transition: opacity 360ms ease, transform 360ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .ux-frame-app.open, .ux-frame-app.open-instant { opacity: 1; transform: translateY(0) scale(1); }
      .ux-frame-app.open-instant { transition: none; }

      .ux-teams { display: flex; flex: 1; min-height: 0; }
      .ux-teams-side {
        background: #f3f2f1; padding: 6px 4px; display: flex; flex-direction: column;
        gap: 4px; align-items: center; border-right: 1px solid #e5e5e5;
      }
      .ux-teams-side-dot {
        width: 22px; height: 22px; border-radius: 5px;
        display: grid; place-items: center; color: #6b7280;
      }
      .ux-teams-side-dot.active { background: rgba(91, 83, 214, 0.12); color: #5B53D6; }
      .ux-teams-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

      /* ─── Cyan unifying thread (final phase) ─── */
      .ux-thread {
        position: absolute; left: 0; right: 0; bottom: -2px; height: 16px;
        pointer-events: none; opacity: 0;
        transition: opacity 200ms ease;
      }
      .ux-tri.is-final .ux-thread { opacity: 1; }
      .ux-thread-line {
        position: absolute; left: 8%; right: 8%; top: 50%;
        height: 1.5px; background: linear-gradient(90deg, transparent 0%, var(--r-cyan, #00BFFF) 12%, var(--r-cyan, #00BFFF) 88%, transparent 100%);
        transform-origin: left center; transform: scaleX(0);
        box-shadow: 0 0 8px rgba(0, 191, 255, 0.6);
      }
      .ux-tri.is-final .ux-thread-line {
        animation: uxThreadDraw 800ms cubic-bezier(0.22, 1, 0.36, 1) forwards;

      @keyframes uxThreadDraw { to { transform: scaleX(1); } }
      .ux-thread-dot {
        position: absolute; top: 50%; transform: translate(-50%, -50%);

      .ux-tri.is-final .ux-thread-dot-1 { animation: uxDotPop 320ms ease-out 100ms forwards; }

        0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }

      .platform-bar-mini::before { content: ''; position: absolute; top: -50%; right: -10%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%); pointer-events: none; }
      .cinema-scenario-caption { font-size: 13px; font-weight: 600; color: #475569; text-align: center; padding: 2px 0 6px; }
      .cinema-working-badge { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 4px 12px; font-size: 10px; font-weight: 600; color: #059669; background: rgba(240,253,244,0.9); border: 1px solid #a7f3d0; border-radius: 9999px; backdrop-filter: blur(4px); margin: 4px auto 0; width: fit-content; }
      .flip-card { perspective: 1000px; cursor: pointer; height: 90px; transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
      .flip-card.flipped { height: 240px; }
      .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
      .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
      .flip-card-front, .flip-card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius); border: 1px solid var(--border-subtle); overflow: hidden; }
      .flip-card-front { background: white; display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 10px; padding: 0 16px; }
      .flip-card-back { background: #ffffff; color: #0A1C60; transform: rotateY(180deg); padding: 20px; display: flex; flex-direction: column; justify-content: space-between; border: 2px solid #0070F3; }
      .flip-card-stat { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #0070F3, #0A1C60); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; white-space: nowrap; }
      .flip-card-tap { font-size: 8px; color: #cbd5e1; opacity: 0; animation: fadeIn 1s ease 2s forwards; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .logo-ticker-wrap { overflow: hidden; position: relative; padding: 8px 0; }
      .logo-ticker-wrap::before, .logo-ticker-wrap::after { content: ''; position: absolute; top: 0; bottom: 0; width: 48px; z-index: 1; pointer-events: none; }
      .logo-ticker-wrap::before { left: 0; background: linear-gradient(90deg, white 0%, transparent 100%); }
      .logo-ticker-wrap::after { right: 0; background: linear-gradient(270deg, white 0%, transparent 100%); }
      .logo-ticker { display: flex; align-items: center; gap: 40px; animation: tickerScroll 90s linear infinite; width: max-content; }
      .logo-ticker:hover { animation-play-state: paused; }
      @keyframes tickerScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
      .logo-name { font-size: 13px; font-weight: 700; color: #334155; white-space: nowrap; flex-shrink: 0; letter-spacing: -0.02em; opacity: 0.7; }
      .logo-name:hover { opacity: 1; }
      .logo-divider { width: 1px; height: 16px; background: #e2e8f0; flex-shrink: 0; }

      /* ══════════════════════════════════════════════════════════════
         RECAST SOFTWARE BRAND OVERRIDE — applied on top of legacy styles
         Primary blue #0000CC, Accent cyan #00BFFF, flat surfaces, Inter
         ══════════════════════════════════════════════════════════════ */
      :root {
        /* Recast Application Workspace tokens — true brand palette */
        --r-blue: #0000CC;           /* Primary Brand Blue — hero, top bar, footer */
        --r-blue-hover: #0000A8;
        --r-blue-bright: #00BFFF;    /* Accent Cyan — CTAs, highlights, "+" energy */
        --r-cyan: #00BFFF;
        --r-cyan-hover: #33CCFF;
        --r-orange: #00BFFF;
        --r-decorator: rgba(0,191,255,0.35);  /* cyan "+" marks on hero — subtle, on-brand */
        --r-decorator-2: rgba(0,191,255,0.25);
        --r-ink: #1A1A2E;
        --r-ink-2: #4A4A5A;
        --r-muted-blue: #AABBEE;
        --r-surface: #FFFFFF;
        --r-surface-2: #F0F0F6;
        --r-surface-3: #FAFAFE;
        --r-quote-bg: #F6F8FF;
        --r-divider: #DDDDEE;
        --r-red: #CC2222;
        --r-green: #0F7A3F;
        --r-amber: #CC8800;

        --shadow-card: 0 1px 2px rgba(26,26,46,0.06);
        --shadow-hover: 0 2px 8px rgba(26,26,46,0.10);
        --shadow-elevated: 0 8px 24px rgba(26,26,46,0.12);
        --re-green: var(--r-green);
        --bg-main: #FAFAFE;
      }

      html, body {
        background: var(--bg-main) !important;
        background-attachment: initial !important;
        color: var(--r-ink) !important;
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif !important;
        -webkit-font-smoothing: antialiased;
      }
      body { letter-spacing: -0.005em; }

      /* ───── Color remap: #0070F3 (brand accent) → Recast primary blue
         (used for CTAs, borders, brand text). Uses attribute selectors
         to target remaining inline styles without hand-editing each.  */
      [style*="#0070F3"] { /* will be overridden per-property below */ }
      [style*="color:#0070F3"], [style*="color: #0070F3"] { color: var(--r-blue) !important; }
      [style*="background:#0070F3"], [style*="background: #0070F3"],
      [style*="background-color:#0070F3"], [style*="background-color: #0070F3"] { background-color: var(--r-cyan) !important; }
      [style*="border-color:#0070F3"], [style*="border-color: #0070F3"] { border-color: var(--r-blue) !important; }

      /* #0A1C60 (navy headline) → Recast primary blue */
      [style*="color:#0A1C60"], [style*="color: #0A1C60"] { color: var(--r-blue) !important; }
      [style*="background:#0A1C60"], [style*="background: #0A1C60"],
      [style*="background-color:#0A1C60"] { background-color: var(--r-blue) !important; }
      [style*="border-color:#0A1C60"] { border-color: var(--r-blue) !important; }

      /* Tailwind arbitrary values used throughout */
      .text-\[\#0070F3\] { color: var(--r-blue) !important; }
      .bg-\[\#0070F3\]   { background-color: var(--r-cyan) !important; }
      .hover\:bg-\[\#005AD0\]:hover { background-color: var(--r-cyan-hover) !important; }
      .border-\[\#0070F3\] { border-color: var(--r-blue) !important; }
      .ring-\[\#0070F3\]   { --tw-ring-color: var(--r-blue) !important; }

      .text-\[\#0A1C60\] { color: var(--r-blue) !important; }
      .bg-\[\#0A1C60\]   { background-color: var(--r-blue) !important; }
      .border-\[\#0A1C60\] { border-color: var(--r-blue) !important; }

      .text-\[\#4A5568\], .text-\[\#4B5563\], .text-\[\#64748B\], .text-\[\#475569\] { color: var(--r-ink-2) !important; }
      .text-\[\#334155\] { color: var(--r-ink) !important; }

      /* Class-driven legacy rules — override with Recast tokens */
      .re-primary {
        background: var(--r-cyan) !important;
        color: #fff !important;
        border-radius: 6px !important;
        padding: 10px 20px !important;
        font-weight: 600 !important;
        box-shadow: none !important;
      }
      .re-primary:hover { background: var(--r-cyan-hover) !important; transform: translateY(-1px) !important; }
      .re-secondary {
        background: transparent !important;
        color: var(--r-blue) !important;
        border: 1.5px solid var(--r-blue) !important;
        border-radius: 6px !important;
        padding: 10px 20px !important;
        font-weight: 600 !important;
      }
      .re-secondary:hover {
        background: var(--r-quote-bg) !important;
        color: var(--r-blue) !important;
        border-color: var(--r-blue) !important;
      }

      /* ───── Section cards: flat, subtle, Recast */
      .section-card {
        background: var(--r-surface) !important;
        border: 1px solid var(--r-divider) !important;
        border-radius: 8px !important;
        box-shadow: var(--shadow-card) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      .section-card:hover { box-shadow: var(--shadow-hover) !important; }

      .glass, .glass-soft {
        background: var(--r-surface) !important;
        border: 1px solid var(--r-divider) !important;
        box-shadow: var(--shadow-card) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      .sub-card {
        border-radius: 6px !important;
        background: var(--r-surface-3) !important;
        border: 1px solid var(--r-divider) !important;
      }

      /* ───── Header / hero ───── */
      header.relative {
        background: var(--r-blue);
        color: #fff;
        position: relative;
        margin-bottom: 0;
      }

      /* ═════════════════════════════════════════════════════════════
         RS APPBAR — compact product strip + clean white tab rail.
         Replaces the tall blue hero. The blue band is just a product
         identifier; the tabs live on white below.
         ═════════════════════════════════════════════════════════════ */
      header.rs-appbar {
        position: relative;
        margin-bottom: 0;
        background: #fff;
        border-bottom: 1px solid #E2E8F0;

        background: var(--r-blue);

      }

        margin: 0 auto;
        padding: 11px 24px;
        display: flex;
        align-items: center;
        gap: 14px;
        min-height: 44px;
      }
      .rs-brand {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        flex-shrink: 0;
      }
      .rs-brand-mark {
        display: inline-grid;
        place-items: center;

        background: #fff;
        color: var(--r-blue);

        font-weight: 800;

        letter-spacing: -0.01em;
        line-height: 1;
      }
      .rs-brand-label {
        font-size: 13px;
        font-weight: 700;

      .rs-product {

        font-weight: 700;
        color: #fff;
        letter-spacing: -0.005em;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .rs-em-dash {
        color: rgba(255,255,255,0.45);
        font-weight: 400;
        flex-shrink: 0;
        font-size: 14px;
      }
      .rs-subtitle {
        font-size: 13px;
        color: rgba(255,255,255,0.78);
        font-weight: 400;
        line-height: 1.3;
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* White tab rail under the blue strip */
      .rs-tabbar {
        background: #fff;
      }
      .rs-tabbar-inner {
        max-width: 1440px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: stretch;
        gap: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .rs-tabbar-inner::-webkit-scrollbar { display: none; }
      .rs-tab {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 12px 18px 11px;
        font-size: 13.5px;
        font-weight: 500;
        color: #64748B;
        background: transparent;
        border: 0;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px; /* overlap the appbar bottom border */
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        line-height: 1;
        letter-spacing: -0.005em;
        transition: color 140ms, border-color 140ms, background 140ms;
      }
      .rs-tab i, .rs-tab svg {
        color: #94A3B8;
        transition: color 140ms;
      }
      .rs-tab:hover:not(.is-active) {
        color: var(--r-ink);
        background: #F8FAFC;
      }
      .rs-tab:hover:not(.is-active) i, .rs-tab:hover:not(.is-active) svg {
        color: var(--r-ink-2);
      }
      .rs-tab.is-active {
        color: var(--r-blue);
        border-bottom-color: var(--r-cyan);
        font-weight: 600;
      }
      .rs-tab.is-active i, .rs-tab.is-active svg {
        color: var(--r-blue) !important;
      }
      .rs-tab:focus-visible {
        outline: 2px solid var(--r-cyan);
        outline-offset: -2px;
      }

      /* Mobile: keep one row, allow horizontal scroll, tighten paddings */
      @media (max-width: 720px) {
        .rs-appbar-inner {
          padding: 9px 14px;
          gap: 10px;
          min-height: 40px;
        }
        .rs-em-dash, .rs-appbar-divider { display: none; }
        .rs-subtitle { display: none; }
        .rs-product { font-size: 13px; }
        .rs-brand-label { font-size: 12.5px; }
        .rs-tabbar-inner { padding: 0 14px; }
        .rs-tab { padding: 11px 14px 10px; font-size: 13px; }
      }

      /* Signature "+" decoration on primary-blue hero — Recast brand mark.
         Few, large, asymmetric; never overlapping content. */
      header.relative::before {
        content: "+";
        position: absolute;
        top: 18px;
        right: 6%;
        color: var(--r-decorator);
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 700;
        font-size: 26px;
        opacity: 0.9;
        pointer-events: none;
        z-index: 0;
        text-shadow:
          440px 24px 0 var(--r-decorator),
          -120px 80px 0 var(--r-decorator),
          280px 120px 0 var(--r-decorator),
          -380px 8px 0 var(--r-decorator),
          -480px 110px 0 var(--r-decorator);
      }
      header.relative::after {
        content: "";
        display: none;
      }

      header.relative > div { position: relative; z-index: 1; }
      header.relative > div:first-child {
        padding-top: 14px !important;
        padding-bottom: 10px !important;

      header.relative > div:last-child { padding-bottom: 0 !important; }

      header.relative h1::after {

      .recast-hero-ctas {

        background: #fff;
        color: var(--r-blue);
        border-color: #fff;
      }
      .recast-hero-ctas button.primary:hover { background: var(--r-muted-blue); }
      .recast-hero-ctas button.outline {
        background: transparent;
        color: #fff;
        border-color: #fff;

      /* Tab bar — clean underline rail at the bottom of the hero */
      .recast-tabs {

        font-size: 13px;
        padding: 10px 16px;

        border: 0;

      header.relative [role="tablist"] {
        background: transparent !important;
        border: 0 !important;
        border-top: 1px solid rgba(255,255,255,0.15) !important;
        border-radius: 0 !important;
        padding: 0 !important;
        margin: 0 !important;
        backdrop-filter: none !important;
        gap: 0 !important;
        flex-wrap: nowrap !important;
        overflow-x: auto;

      header.relative [role="tablist"]::-webkit-scrollbar { display: none; }
      header.relative [role="tablist"] button {
        color: rgba(255,255,255,0.72) !important;
        font-weight: 600 !important;
        font-size: 13px !important;
        padding: 10px 16px !important;
        border-radius: 0 !important;
        background: transparent !important;
        border-bottom: 2px solid transparent !important;
        margin-bottom: -1px;
        transition: color 150ms, border-color 150ms, background 150ms !important;
        white-space: nowrap;
        flex-shrink: 0;

      header.relative [role="tablist"] button[aria-selected="true"],
      header.relative [role="tablist"] button.bg-\[\#0070F3\] {

      main.mx-auto { padding-top: 18px; }

      /* ───── Typography polish ───── */
      h2, .text-lg, .text-xl, .text-2xl {
        letter-spacing: -0.015em;
      }
      /* Headings that used the old navy → primary blue */
      h2.text-\[\#0A1C60\], h3.text-\[\#0A1C60\],
      h2.text-\[\#0070F3\], h3.text-\[\#0070F3\] { color: var(--r-blue) !important; }

      /* ───── Buttons / interactive surfaces ───── */
      button, [role="button"] { font-family: inherit; }
